  // Reflective water
  const water = document.getElementById('waterPlane');
  const waterCtx = water.getContext('2d', { alpha: true });
  const hero = document.querySelector('.hero');
  const mark = document.querySelector('.hero .mark');
  const title = document.querySelector('.hero h1');
  const studio = document.querySelector('.hero .studio');
  const magic = document.getElementById('magicPlane');
  const magicCtx = magic.getContext('2d', { alpha: true });
  const logoImg = new Image();
  logoImg.src = 'assets/Logo.svg';

  let waterWidth = 0;
  let waterHeight = 0;
  let waterDpr = 1;
  let magicDpr = 1;
  let surfaceY = 0;
  let pointerX = innerWidth / 2;
  let pointerY = innerHeight / 2;
  let lastPointerX = pointerX;
  let lastPointerY = pointerY;
  let lastWaterTime = performance.now();
  let lastMagicTime = performance.now();
  let pointerInsideWater = false;
  const ripples = [];
  const drops = [];
  const magicDust = [];
  const magicBursts = [];
  const underDust = [];  // flakes below the surface — rendered inside the water sim so real waves refract them
  let simWater = null;   // WebGL2 ripple physics — null means the legacy 2D path runs
  let simEnergy = 0;     // recent-disturbance energy, drives the surface glow pulse
  let introWet = false;  // intro: type is submerged — render it into the refraction texture

  const reflectionCanvas = document.createElement('canvas');
  const reflectionCtx = reflectionCanvas.getContext('2d');
  const sliceCanvas = document.createElement('canvas');
  const sliceCtx = sliceCanvas.getContext('2d');
  const logoScratch = document.createElement('canvas');
  const logoScratchCtx = logoScratch.getContext('2d');

  function resizeWater(){
    const rect = water.getBoundingClientRect();
    waterDpr = Math.min(devicePixelRatio || 1, 2);
    waterWidth = Math.max(1, rect.width);
    waterHeight = Math.max(1, rect.height);
    water.width = Math.round(waterWidth * waterDpr);
    water.height = Math.round(waterHeight * waterDpr);
    waterCtx.setTransform(waterDpr, 0, 0, waterDpr, 0, 0);
    magicDpr = Math.min(devicePixelRatio || 1, 2);
    magic.width = Math.round(innerWidth * magicDpr);
    magic.height = Math.round(innerHeight * magicDpr);
    magicCtx.setTransform(magicDpr, 0, 0, magicDpr, 0, 0);
    reflectionCanvas.width = Math.round(waterWidth * waterDpr);
    reflectionCanvas.height = Math.round(waterHeight * waterDpr);
    reflectionCtx.setTransform(waterDpr, 0, 0, waterDpr, 0, 0);
    sliceCanvas.width = Math.round(waterWidth * waterDpr);
    sliceCanvas.height = Math.round(waterHeight * waterDpr);
    sliceCtx.setTransform(waterDpr, 0, 0, waterDpr, 0, 0);
    surfaceY = Math.max(52, Math.min(waterHeight * 0.44, waterHeight - 240));
    if (simWater) simWater.resize();
  }

  function brandGlowState(){
    // The reflection mirrors the strongest single glow — pulses and cross-fades
    // stay above the surface where they read clearly.
    let best = null;
    if (brandGlow.current && brandGlow.current.strength > 0.02) best = brandGlow.current;
    if (brandGlow.pinned && (!best || best.strength < 0.7)){
      best = { el: brandGlow.pinned.el, x: brandGlow.pinned.x, y: brandGlow.pinned.y, strength: 0.7 };
    }
    return best;
  }

  function brandGlowSignature(){
    const glow = brandGlowState();
    if (!glow) return 'none';
    return (glow.el === mark ? 'mark' : glow.el === title ? 'title' : 'studio') +
      ':' + Math.round(glow.x) + ':' + Math.round(glow.y) + ':' + glow.strength.toFixed(2);
  }

  function colorForCssVar(name){
    return getComputedStyle(root).getPropertyValue(name).trim();
  }

  function fillLogo(ctx, x, y, w, h, glow){
    if (!(logoImg.complete && logoImg.naturalWidth) || w <= 0 || h <= 0) return;
    // Recolor the logo opaquely on its own scratch canvas first, then composite
    // it once into ctx — otherwise the source-in fill and the caller's reflection
    // alpha multiply together and the result is effectively invisible.
    const sw = Math.max(1, Math.ceil(w));
    const sh = Math.max(1, Math.ceil(h));
    if (logoScratch.width !== sw) logoScratch.width = sw;
    if (logoScratch.height !== sh) logoScratch.height = sh;
    logoScratchCtx.clearRect(0, 0, sw, sh);
    logoScratchCtx.drawImage(logoImg, 0, 0, sw, sh);
    logoScratchCtx.globalCompositeOperation = 'source-in';
    logoScratchCtx.fillStyle = colorForCssVar('--bone');
    logoScratchCtx.fillRect(0, 0, sw, sh);
    if (glow && glow.el === mark){
      logoScratchCtx.globalCompositeOperation = 'source-atop';
      const markRect = mark.getBoundingClientRect();
      const gx = clamp01((glow.x - markRect.left) / Math.max(1, markRect.width)) * sw;
      const gy = clamp01((glow.y - markRect.top) / Math.max(1, markRect.height)) * sh;
      const r = Math.max(sw, sh) * 0.44;
      const grad = logoScratchCtx.createRadialGradient(gx, gy, 0, gx, gy, r);
      grad.addColorStop(0.00, 'hsla(15, 75%, 62%, 0.96)');
      grad.addColorStop(0.16, 'hsla(48, 78%, 62%, 0.92)');
      grad.addColorStop(0.30, 'hsla(128, 52%, 58%, 0.84)');
      grad.addColorStop(0.46, 'hsla(192, 64%, 60%, 0.72)');
      grad.addColorStop(0.62, 'hsla(262, 54%, 66%, 0.54)');
      grad.addColorStop(0.78, 'hsla(322, 64%, 66%, 0.28)');
      grad.addColorStop(1.00, 'hsla(322, 64%, 66%, 0)');
      logoScratchCtx.fillStyle = grad;
      logoScratchCtx.fillRect(0, 0, sw, sh);
    }
    logoScratchCtx.globalCompositeOperation = 'source-over';
    ctx.drawImage(logoScratch, x, y, w, h);
  }

  function drawReflectedSplit(ctx, el, waterRect, baseColor, baseAlpha, glow){
    const style = getComputedStyle(el);
    const elRect = el.getBoundingClientRect();
    const radius = Math.max(86, Math.min(170, elRect.width * 0.32));
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.font = style.fontWeight + ' ' + style.fontSize + ' ' + style.fontFamily;
    el.querySelectorAll('.ch:not(.sp)').forEach(ch => {
      const chRect = ch.getBoundingClientRect();
      const x = chRect.left - waterRect.left;
      const y = chRect.top - waterRect.top;
      ctx.globalAlpha = baseAlpha;
      ctx.fillStyle = baseColor;
      ctx.fillText(ch.textContent, x, y);
      if (glow && glow.el === el){
        const dx = chRect.left + chRect.width / 2 - glow.x;
        const dy = chRect.top + chRect.height / 2 - glow.y;
        const d = Math.hypot(dx, dy);
        const alpha = clamp01(1 - d / radius) * glow.strength;
        if (alpha > 0.02){
          ctx.globalAlpha = baseAlpha * (1 + alpha * 1.8);
          ctx.fillStyle = 'hsl(' + localHue(d).toFixed(2) + ', 60%, 70%)';
          ctx.shadowColor = 'hsla(' + localHue(d).toFixed(2) + ', 68%, 70%, ' + (alpha * 0.34).toFixed(3) + ')';
          ctx.shadowBlur = 6 + alpha * 10;
          ctx.fillText(ch.textContent, x, y);
          ctx.shadowBlur = 0;
        }
      }
    });
    ctx.globalAlpha = 1;
  }

  function drawReflectionSource(){
    reflectionCtx.clearRect(0, 0, waterWidth, waterHeight);
    const waterRect = water.getBoundingClientRect();
    const markRect = mark.getBoundingClientRect();
    const titleRect = title.getBoundingClientRect();
    const studioRect = studio.getBoundingClientRect();
    const glow = brandGlowState();

    // Mirror the brand about the waterline (surfaceY) and foreshorten it, the way
    // a real reflection compresses with distance. This keeps every reflection
    // sitting directly under its element and pulls the tall logo up into view
    // instead of stranding it in the faded depths.
    const compress = 0.66;
    reflectionCtx.save();
    reflectionCtx.translate(0, surfaceY);
    reflectionCtx.scale(1, -compress);
    reflectionCtx.translate(0, -surfaceY);
    // The logo sits highest, so its reflection lands deepest in the fade — give
    // it a heavier alpha so it survives and reads under the mark.
    reflectionCtx.globalAlpha = isLight() ? 0.30 : 0.36;

    fillLogo(
      reflectionCtx,
      markRect.left - waterRect.left,
      markRect.top - waterRect.top,
      markRect.width,
      markRect.height,
      glow
    );

    drawReflectedSplit(reflectionCtx, title, waterRect, colorForCssVar('--bone'), isLight() ? 0.16 : 0.20, glow);
    drawReflectedSplit(reflectionCtx, studio, waterRect, colorForCssVar('--bone-dim'), isLight() ? 0.13 : 0.16, glow);
    reflectionCtx.restore();

    if (introWet){
      // intro: the type is still underwater — draw it unmirrored at its live
      // position so the water shader refracts it like an object below the
      // surface (the depth fade below dims it the deeper it sits)
      drawReflectedSplit(reflectionCtx, title, waterRect, colorForCssVar('--bone'), isLight() ? 0.50 : 0.55, null);
      drawReflectedSplit(reflectionCtx, studio, waterRect, colorForCssVar('--bone-dim'), isLight() ? 0.40 : 0.45, null);
    }

    reflectionCtx.save();
    const fade = reflectionCtx.createLinearGradient(0, surfaceY, 0, waterHeight);
    fade.addColorStop(0, 'rgba(0,0,0,0.42)');
    fade.addColorStop(0.10, 'rgba(0,0,0,0.82)');
    fade.addColorStop(0.5, 'rgba(0,0,0,0.42)');
    fade.addColorStop(1, 'rgba(0,0,0,0)');
    reflectionCtx.globalCompositeOperation = 'destination-in';
    reflectionCtx.fillStyle = fade;
    reflectionCtx.fillRect(0, 0, waterWidth, waterHeight);
    reflectionCtx.restore();
  }

  function addRipple(x, y, strength = 1){
    const waterRect = water.getBoundingClientRect();
    ripples.push({
      x: x - waterRect.left,
      y: y - waterRect.top,
      radius: 2,
      strength,
      life: 1
    });
    if (ripples.length > 36) ripples.shift();
  }

  function spawnDrops(x, y, force){
    const waterRect = water.getBoundingClientRect();
    const localY = y - waterRect.top;
    for (let i = 0; i < Math.min(5, Math.ceil(force * 2)); i++){
      drops.push({
        x: x - waterRect.left + (Math.random() - 0.5) * 16,
        y: localY + (Math.random() - 0.5) * 6,
        vx: (Math.random() - 0.5) * 0.06,
        vy: -0.08 - Math.random() * 0.08,
        life: 0.75
      });
    }
    if (drops.length > 50) drops.splice(0, drops.length - 50);
  }

  function disturbFromPointer(x, y, force){
    const waterRect = water.getBoundingClientRect();
    const localY = y - waterRect.top;
    if (localY < surfaceY - 18 || localY > waterHeight + 12) return false;
    if (simWater){
      simWater.disturb(x - waterRect.left, localY, force);
      if (force >= 1) spawnDrops(x, y, force);
      return true;
    }
    addRipple(x, y, force);
    spawnDrops(x, y, force);
    return true;
  }

  function disturbFromMagicDust(x, y, force){
    const waterRect = water.getBoundingClientRect();
    const localY = y - waterRect.top;
    // tight radius — a dust flake makes a small, sharp ring, not a finger-sized plop
    if (simWater) simWater.disturb(x - waterRect.left, localY, force, 0.55);
    else addRipple(x, y, force);
    simEnergy = Math.min(3, simEnergy + force * 0.18);
  }

  function spawnBrandMagic(el, x, y, mode = 'click'){
    const rect = el.getBoundingClientRect();
    const sourceX = Math.max(rect.left, Math.min(rect.right, x));
    const sourceY = Math.max(rect.top, Math.min(rect.bottom, y));
    const baseHue = localHue(Math.hypot(sourceX - rect.left, sourceY - rect.top));
    const click = mode === 'click';
    if (click || Math.random() > 0.45){
      magicBursts.push({
        x: sourceX,
        y: sourceY,
        hue: baseHue,
        age: 0,
        life: reduced ? 460 : click ? 980 : 360,
        radius: Math.max(26, Math.min(click ? 150 : 62, rect.width * (el === mark ? (click ? 1.05 : 0.48) : (click ? 0.42 : 0.20))))
      });
    }

    if (reduced) return;
    const count = click ? (el === mark ? 72 : 54) : (el === mark ? 5 : 3);
    for (let i = 0; i < count; i++){
      const fountain = click && Math.random() < 0.34;
      const angle = fountain ? -Math.PI * 0.88 + Math.random() * Math.PI * 0.76 : Math.PI * 0.38 + Math.random() * Math.PI * 0.24;
      const speed = fountain ? 0.070 + Math.random() * 0.120 : (click ? 0.040 + Math.random() * 0.120 : 0.025 + Math.random() * 0.050);
      const drift = click ? 0.052 : 0.022;
      magicDust.push({
        x: sourceX + (Math.random() - 0.5) * rect.width * (click ? 0.18 : 0.08),
        y: sourceY + (Math.random() - 0.5) * rect.height * (click ? 0.18 : 0.08),
        vx: Math.cos(angle) * speed + (Math.random() - 0.5) * drift,
        vy: Math.sin(angle) * speed + (fountain ? 0 : 0.020),
        hue: (baseHue + i * 17 + Math.random() * 42) % 360,
        size: (click ? 0.70 : 0.45) + Math.random() * (click ? 1.75 : 0.95),
        spin: Math.random() * Math.PI * 2,
        shimmer: 0.65 + Math.random() * (click ? 0.75 : 0.45),
        state: 'fall',
        age: 0,
        life: 1,
        impacted: false,
        click
      });
    }
    if (magicDust.length > 240) magicDust.splice(0, magicDust.length - 240);
    if (magicBursts.length > 12) magicBursts.splice(0, magicBursts.length - 12);
  }

  function drawMagic(time){
    const dt = Math.min(46, time - lastMagicTime);
    lastMagicTime = time;
    animateBrandGlow(time, dt);
    magicCtx.clearRect(0, 0, innerWidth, innerHeight);
    magicCtx.save();
    magicCtx.globalCompositeOperation = 'lighter';

    for (let i = magicBursts.length - 1; i >= 0; i--){
      const burst = magicBursts[i];
      burst.age += dt;
      const t = Math.min(1, burst.age / burst.life);
      const alpha = Math.pow(1 - t, 1.8);
      const radius = burst.radius * (0.18 + t * 1.15);
      magicCtx.lineWidth = 1.1 + (1 - t) * 1.8;
      for (let j = 0; j < 3; j++){
        magicCtx.beginPath();
        magicCtx.arc(burst.x, burst.y, radius + j * 8, 0, Math.PI * 2);
        magicCtx.strokeStyle = 'hsla(' + ((burst.hue + j * 76) % 360).toFixed(2) + ', 72%, 70%, ' + (alpha * (0.24 - j * 0.055)).toFixed(3) + ')';
        magicCtx.stroke();
      }
      if (t >= 1) magicBursts.splice(i, 1);
    }

    const waterRect = water.getBoundingClientRect();
    const surfaceScreenY = waterRect.top + surfaceY;
    for (let i = magicDust.length - 1; i >= 0; i--){
      const dust = magicDust[i];
      dust.age += dt;
      dust.spin += dt * 0.006 * dust.shimmer;
      if (dust.state === 'fall'){
        dust.vy += (dust.click ? 0.00036 : 0.00028) * dt;
        dust.x += (dust.vx + Math.sin(dust.age * 0.010 + dust.shimmer) * (dust.click ? 0.014 : 0.009)) * dt;
        dust.y += dust.vy * dt;
        if (dust.y >= surfaceScreenY && dust.x >= waterRect.left - 12 && dust.x <= waterRect.right + 12){
          if (!dust.impacted){
            dust.impacted = true;
            // each flake lands with a small but genuinely visible ring
            disturbFromMagicDust(dust.x, dust.y, 0.5 + dust.size * (dust.click ? 0.45 : 0.30));
            sound.plink(dust.x, dust.size);
            if (dust.size > 1.1 || Math.random() < 0.35) spawnDrops(dust.x, dust.y, 0.7);
          }
          if (simWater){
            // hand the flake to the water sim: from here on it lives under the
            // surface and gets refracted by the real waves as it sinks
            underDust.push({
              x: dust.x - waterRect.left,
              y: surfaceY + 1.5,
              vx: dust.vx * 0.25,
              vy: 0.010 + Math.random() * 0.018,
              hue: dust.hue,
              size: Math.max(0.5, dust.size),
              life: 1,
              age: 0,
              phase: Math.random() * Math.PI * 2
            });
            if (underDust.length > 160) underDust.shift();
            magicDust.splice(i, 1);
            continue;
          }
          dust.y = surfaceScreenY + Math.random() * 2;
          dust.vx *= 0.22;
          dust.vy = (dust.click ? 0.018 : 0.012) + Math.random() * 0.026;
          dust.state = 'sink';
          dust.age = 0;
          dust.life = 1;
        }
      } else {
        dust.vy += 0.000018 * dt;
        dust.x += (dust.vx + Math.sin(dust.age * 0.017 + dust.spin) * 0.006) * dt;
        dust.y += dust.vy * dt;
        dust.life -= dt * 0.00038;
        dust.size *= Math.pow(0.9992, dt);
      }

      const sinkFade = dust.state === 'sink' ? dust.life : Math.max(0, 1 - dust.age * 0.00016);
      const alpha = Math.max(0, Math.min(dust.click ? 0.86 : 0.64, sinkFade * (dust.state === 'sink' ? (dust.click ? 0.54 : 0.38) : (dust.click ? 0.82 : 0.58))));
      if (alpha <= 0.01 || dust.y > innerHeight + 24){
        magicDust.splice(i, 1);
        continue;
      }
      const size = Math.max(0.25, dust.size * (dust.state === 'sink' ? 0.72 : 1));
      magicCtx.shadowBlur = dust.state === 'sink' ? (dust.click ? 10 : 6) : (dust.click ? 16 : 9);
      magicCtx.shadowColor = 'hsla(' + dust.hue.toFixed(2) + ', 78%, 70%, ' + (alpha * 0.82).toFixed(3) + ')';
      magicCtx.fillStyle = 'hsla(' + dust.hue.toFixed(2) + ', 82%, 72%, ' + alpha.toFixed(3) + ')';
      magicCtx.beginPath();
      magicCtx.ellipse(dust.x, dust.y, size * 1.45, size * 0.62, dust.spin, 0, Math.PI * 2);
      magicCtx.fill();

      if (dust.state === 'sink'){
        magicCtx.shadowBlur = 3;
        for (let f = 0; f < (dust.click ? 3 : 2); f++){
          const fx = dust.x + Math.sin(dust.age * 0.012 + f * 2.1) * (3 + f * 2);
          const fy = dust.y - f * 5 - dust.age * 0.004;
          magicCtx.fillStyle = 'hsla(' + ((dust.hue + f * 44) % 360).toFixed(2) + ', 76%, 70%, ' + (alpha * 0.28).toFixed(3) + ')';
          magicCtx.beginPath();
          magicCtx.arc(fx, fy, Math.max(0.18, size * 0.36), 0, Math.PI * 2);
          magicCtx.fill();
        }
      }
    }
    magicCtx.restore();
    requestAnimationFrame(drawMagic);
  }

  function waveOffset(x, y, time){
    let offset = 0;
    for (const ripple of ripples){
      const dx = x - ripple.x;
      const dy = (y - ripple.y) * 2.8;
      const dist = Math.hypot(dx, dy);
      const crest = ripple.radius;
      const falloff = Math.max(0, 1 - Math.abs(dist - crest) / 54);
      offset += Math.sin((dist - crest) * 0.18) * falloff * ripple.life * ripple.strength * 7;
    }
    if (pointerInsideWater){
      const waterRect = water.getBoundingClientRect();
      const dx = x - (pointerX - waterRect.left);
      const dy = (y - (pointerY - waterRect.top)) * 2.5;
      const dist = Math.hypot(dx, dy);
      const falloff = Math.max(0, 1 - dist / 92);
      offset += Math.sin(dist * 0.22 - time * 0.012) * falloff * 1.6;
    }
    return offset;
  }

  function drawDistortedReflection(time){
    sliceCtx.clearRect(0, 0, waterWidth, waterHeight);
    const row = 3;
    for (let y = 0; y < waterHeight; y += row){
      const depth = Math.max(0, (y - surfaceY) / Math.max(1, waterHeight - surfaceY));
      let energy = 0;
      for (const ripple of ripples){
        const dy = Math.abs(y - ripple.y);
        energy += Math.max(0, 1 - dy / 180) * ripple.life * ripple.strength;
      }
      const idle = (
        Math.sin(y * 0.045 + time * 0.00070) * 0.6 +
        Math.sin(y * 0.110 + time * 0.00130) * 0.3 +
        Math.sin(y * 0.021 - time * 0.00050) * 0.5
      ) * depth;
      const pointerWave = waveOffset(waterWidth * 0.5, y, time) * 0.14;
      const shift = idle + pointerWave + Math.sin(y * 0.13 + time * 0.0011) * energy * 1.4;
      // Source rect is in the reflection canvas's backing-store pixels (which are
      // scaled by waterDpr); the destination is in CSS pixels via sliceCtx's
      // transform. Mixing the two is what pushed the reflection low and to the
      // right on Retina (dpr 2) displays.
      sliceCtx.drawImage(
        reflectionCanvas,
        0, y * waterDpr, waterWidth * waterDpr, row * waterDpr,
        shift, y, waterWidth, row
      );
    }
    waterCtx.drawImage(sliceCanvas, 0, 0, waterWidth, waterHeight);
  }

  function drawWater(time){
    const dt = Math.min(34, time - lastWaterTime);
    lastWaterTime = time;
    waterCtx.clearRect(0, 0, waterWidth, waterHeight);
    if (!waterWidth || !waterHeight) return;

    drawReflectionSource();
    drawDistortedReflection(time);

    const light = isLight();
    const line = light ? '34, 92, 104' : '205, 229, 228';
    const glow = light ? '55, 112, 122' : '173, 211, 214';
    const surfacePulse = ripples.reduce((sum, ripple) => sum + ripple.life * ripple.strength, 0);

    // glow fades in from zero above the line so the wavy stroke is the only
    // visible edge — a hard gradient start reads as a second horizon line
    const gradTop = surfaceY - 36;
    const surfaceGrad = waterCtx.createLinearGradient(0, gradTop, 0, waterHeight);
    const lineStop = Math.min(1, 36 / Math.max(1, waterHeight - gradTop));
    surfaceGrad.addColorStop(0, 'rgba(' + glow + ', 0)');
    surfaceGrad.addColorStop(lineStop, 'rgba(' + glow + ', ' + ((light ? 0.035 : 0.045) + Math.min(0.05, surfacePulse * 0.01)) + ')');
    surfaceGrad.addColorStop(1, 'rgba(' + glow + ', 0)');
    waterCtx.fillStyle = surfaceGrad;
    waterCtx.fillRect(0, Math.max(0, gradTop), waterWidth, waterHeight);

    waterCtx.save();
    waterCtx.beginPath();
    for (let x = 0; x <= waterWidth; x += 12){
      const y = surfaceY
        + Math.sin(x * 0.013 + time * 0.0009) * 1.2
        + Math.sin(x * 0.031 - time * 0.0013) * 0.6
        + waveOffset(x, surfaceY, time) * 0.26;
      if (x === 0) waterCtx.moveTo(x, y);
      else waterCtx.lineTo(x, y);
    }
    waterCtx.strokeStyle = 'rgba(' + line + ', ' + (0.055 + Math.min(0.16, surfacePulse * 0.018)) + ')';
    waterCtx.lineWidth = 0.8;
    waterCtx.stroke();
    waterCtx.restore();

    for (let i = ripples.length - 1; i >= 0; i--){
      const ripple = ripples[i];
      ripple.radius += dt * (0.055 + ripple.strength * 0.016);
      ripple.life -= dt * 0.00072;
      const alpha = Math.max(0, ripple.life) * (light ? 0.13 : 0.18) * ripple.strength;
      waterCtx.beginPath();
      waterCtx.ellipse(ripple.x, ripple.y, ripple.radius, ripple.radius * 0.22, 0, 0, Math.PI * 2);
      waterCtx.strokeStyle = 'rgba(' + line + ', ' + alpha + ')';
      waterCtx.lineWidth = 0.7;
      waterCtx.stroke();
      waterCtx.beginPath();
      waterCtx.ellipse(ripple.x, ripple.y, ripple.radius * 0.56, ripple.radius * 0.13, 0, 0, Math.PI * 2);
      waterCtx.strokeStyle = 'rgba(' + line + ', ' + (alpha * 0.52) + ')';
      waterCtx.stroke();
      if (ripple.life <= 0) ripples.splice(i, 1);
    }

    drawDrops(dt, line);

    requestAnimationFrame(drawWater);
  }

  function drawDrops(dt, line){
    for (let i = drops.length - 1; i >= 0; i--){
      const drop = drops[i];
      drop.x += drop.vx * dt;
      drop.y += drop.vy * dt;
      drop.vy += 0.0009 * dt;
      drop.life -= dt * 0.0011;
      waterCtx.beginPath();
      waterCtx.arc(drop.x, drop.y, 0.8, 0, Math.PI * 2);
      waterCtx.fillStyle = 'rgba(' + line + ', ' + (Math.max(0, drop.life) * 0.16) + ')';
      waterCtx.fill();
      if (drop.life <= 0) drops.splice(i, 1);
    }
  }

  // ── Real ripple physics (WebGL2 height field) ─────────────
  // Every touch presses the surface down at that spot; the wave equation then
  // propagates it outward, ripples interfere and bounce off the edges, and the
  // reflection is refracted per-pixel by the local surface slope — instead of
  // the old whole-row wobble. The sim runs in "plane space": screen y is
  // remapped so ripples foreshorten toward the waterline like a receding pond.
  const SIM_GAMMA = 1.8;

  function initSimWater(){
    const canvas = document.getElementById('waterSim');
    const gl = canvas.getContext('webgl2', { alpha: true, antialias: false, premultipliedAlpha: true });
    if (!gl) return null;
    if (!gl.getExtension('EXT_color_buffer_float') && !gl.getExtension('EXT_color_buffer_half_float')) return null;

    const VS_SRC = '#version 300 es\n' +
      'layout(location=0) in vec2 aPos;\n' +
      'out vec2 vUv;\n' +
      'void main(){ vUv = aPos * 0.5 + 0.5; gl_Position = vec4(aPos, 0.0, 1.0); }';

    const STEP_FS = '#version 300 es\n' + `
      precision highp float;
      uniform sampler2D uPrev;
      uniform vec2 uTexel;
      uniform vec2 uSimSize;
      uniform int uDropCount;
      uniform vec4 uDrops[10];
      in vec2 vUv;
      out vec4 outColor;
      void main(){
        vec2 c = texture(uPrev, vUv).rg;
        float hl = texture(uPrev, vUv - vec2(uTexel.x, 0.0)).r;
        float hr = texture(uPrev, vUv + vec2(uTexel.x, 0.0)).r;
        float hu = texture(uPrev, vUv - vec2(0.0, uTexel.y)).r;
        float hd = texture(uPrev, vUv + vec2(0.0, uTexel.y)).r;
        float avg = (hl + hr + hu + hd) * 0.25;
        float vel = (c.g + (avg - c.r) * 0.45) * 0.994;
        float h = (c.r + vel) * 0.9995;
        for (int i = 0; i < 10; i++){
          if (i >= uDropCount) break;
          vec4 d = uDrops[i];
          vec2 p = (vUv - d.xy) * uSimSize;
          h -= d.w * exp(-dot(p, p) / (d.z * d.z));
        }
        outColor = vec4(clamp(h, -3.0, 3.0), vel, 0.0, 1.0);
      }`;

    const DRAW_FS = '#version 300 es\n' + `
      precision highp float;
      uniform sampler2D uHeight;
      uniform sampler2D uRefl;
      uniform sampler2D uDust;
      uniform vec2 uSize;
      uniform float uSurfaceY;
      uniform float uTime;
      uniform vec3 uLineCol;
      in vec2 vUv;
      out vec4 outColor;
      const float GAMMA = ${SIM_GAMMA.toFixed(2)};
      void main(){
        float yCss = (1.0 - vUv.y) * uSize.y;
        float span = max(1.0, uSize.y - uSurfaceY);
        float vs = (yCss - uSurfaceY) / span;
        if (vs < -0.03){ outColor = vec4(0.0); return; }
        float vsc = clamp(vs, 0.0, 1.0);
        float inWater = smoothstep(0.0, 0.012, vs);
        vec2 suv = vec2(vUv.x, pow(max(vsc, 0.0001), 1.0 / GAMMA));
        vec2 ts = vec2(textureSize(uHeight, 0));
        vec2 e = 1.5 / ts;
        float dhx = texture(uHeight, suv + vec2(e.x, 0.0)).r - texture(uHeight, suv - vec2(e.x, 0.0)).r;
        float dhy = texture(uHeight, suv + vec2(0.0, e.y)).r - texture(uHeight, suv - vec2(0.0, e.y)).r;

        float idle = (sin(yCss * 0.045 + uTime * 0.0007) * 0.6
                    + sin(yCss * 0.110 + uTime * 0.0013) * 0.3
                    + sin(yCss * 0.021 - uTime * 0.0005) * 0.5) * vsc;

        float near = mix(0.40, 1.0, vsc);
        vec2 off = vec2(dhx * 120.0 * near + idle, dhy * 210.0 * near) / uSize;
        vec4 refl = texture(uRefl, clamp(vUv + off, 0.0, 1.0));

        float glint = pow(clamp(dhy * 10.0, 0.0, 1.0), 1.4) * 0.42 * mix(0.45, 1.0, vsc) * inWater;
        float shade = pow(clamp(-dhy * 10.0, 0.0, 1.0), 1.4) * 0.30 * inWater;

        float hline = texture(uHeight, vec2(vUv.x, 1.5 / ts.y)).r;
        float dlx = texture(uHeight, vec2(vUv.x + e.x, 1.5 / ts.y)).r
                  - texture(uHeight, vec2(vUv.x - e.x, 1.5 / ts.y)).r;
        float lineY = uSurfaceY
                    + sin(vUv.x * uSize.x * 0.013 + uTime * 0.0009) * 1.2
                    + sin(vUv.x * uSize.x * 0.031 - uTime * 0.0013) * 0.6
                    + hline * 22.0;
        float dl = yCss - lineY;
        float lineA = exp(-dl * dl / 1.8) * (0.085 + clamp(abs(dlx) * 5.0, 0.0, 0.22));

        // sunken fairy dust — sampled with a stronger offset than the
        // reflection so passing waves visibly bend the flakes below.
        // Composited "over" (not additively) so it still reads on the cream theme.
        vec4 dustC = texture(uDust, clamp(vUv + off * 2.1, 0.0, 1.0)) * inWater;

        vec3 base = refl.rgb * (1.0 - shade);
        float baseA = refl.a * (1.0 - shade * 0.5);
        vec3 col = dustC.rgb + base * (1.0 - dustC.a) + uLineCol * (glint + lineA);
        float a = clamp(dustC.a + baseA * (1.0 - dustC.a) + glint + lineA, 0.0, 1.0);
        outColor = vec4(col, a);
      }`;

    function shader(type, src){
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
        console.warn('water shader: ' + gl.getShaderInfoLog(s));
        return null;
      }
      return s;
    }
    function program(fsSrc){
      const vs = shader(gl.VERTEX_SHADER, VS_SRC);
      const fs = shader(gl.FRAGMENT_SHADER, fsSrc);
      if (!vs || !fs) return null;
      const p = gl.createProgram();
      gl.attachShader(p, vs);
      gl.attachShader(p, fs);
      gl.linkProgram(p);
      return gl.getProgramParameter(p, gl.LINK_STATUS) ? p : null;
    }

    const stepProg = program(STEP_FS);
    const drawProg = program(DRAW_FS);
    if (!stepProg || !drawProg) return null;

    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

    const su = {
      prev: gl.getUniformLocation(stepProg, 'uPrev'),
      texel: gl.getUniformLocation(stepProg, 'uTexel'),
      simSize: gl.getUniformLocation(stepProg, 'uSimSize'),
      dropCount: gl.getUniformLocation(stepProg, 'uDropCount'),
      drops: gl.getUniformLocation(stepProg, 'uDrops[0]')
    };
    const du = {
      height: gl.getUniformLocation(drawProg, 'uHeight'),
      refl: gl.getUniformLocation(drawProg, 'uRefl'),
      dust: gl.getUniformLocation(drawProg, 'uDust'),
      size: gl.getUniformLocation(drawProg, 'uSize'),
      surfaceY: gl.getUniformLocation(drawProg, 'uSurfaceY'),
      time: gl.getUniformLocation(drawProg, 'uTime'),
      lineCol: gl.getUniformLocation(drawProg, 'uLineCol')
    };

    function texParams(){
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    }

    const reflTex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, reflTex);
    texParams();

    // underwater fairy-dust layer — drawn in 2D, refracted by the shader
    const dustCanvas = document.createElement('canvas');
    const dustCtx = dustCanvas.getContext('2d');
    const dustTex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, dustTex);
    texParams();
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array(4));
    let dustWasEmpty = true;

    let texA = null, texB = null, simW = 0, simH = 0;
    let reflDirty = true, lastGlow = null, lastLight = null;
    let pending = [];
    let accum = 0;
    let prevTime = performance.now();

    function makeSimTex(w, h){
      const t = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, t);
      gl.texStorage2D(gl.TEXTURE_2D, 1, gl.RGBA16F, w, h);
      texParams();
      const f = gl.createFramebuffer();
      gl.bindFramebuffer(gl.FRAMEBUFFER, f);
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
      if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) !== gl.FRAMEBUFFER_COMPLETE) return null;
      gl.clearColor(0, 0, 0, 0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      return { t, f };
    }

    function dropSimTex(pair){
      if (!pair) return;
      gl.deleteTexture(pair.t);
      gl.deleteFramebuffer(pair.f);
    }

    function resize(){
      canvas.width = Math.round(waterWidth * waterDpr);
      canvas.height = Math.round(waterHeight * waterDpr);
      dustCanvas.width = Math.max(1, Math.round(waterWidth));
      dustCanvas.height = Math.max(1, Math.round(waterHeight));
      simW = Math.max(96, Math.min(384, Math.round(waterWidth / 3)));
      simH = Math.max(72, Math.min(288, Math.round(Math.max(1, waterHeight - surfaceY) / 2)));
      dropSimTex(texA);
      dropSimTex(texB);
      texA = makeSimTex(simW, simH);
      texB = makeSimTex(simW, simH);
      reflDirty = true;
    }

    function uploadReflection(){
      gl.bindTexture(gl.TEXTURE_2D, reflTex);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
      gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, true);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, reflectionCanvas);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
      gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, false);
    }

    function disturb(lx, ly, force, radiusScale = 1){
      const span = Math.max(1, waterHeight - surfaceY);
      const vs = (ly - surfaceY) / span;
      if (vs < -0.05 || vs > 1.08) return;
      const vp = Math.pow(Math.min(1, Math.max(vs, 0.004)), 1 / SIM_GAMMA);
      const f = Math.min(3, force);
      pending.push(lx / waterWidth, vp, (3.0 + f * 1.8) * radiusScale, f * 0.20);
      if (pending.length > 40) pending = pending.slice(-40);
      simEnergy = Math.min(3, simEnergy + force * 0.35);
    }

    function uploadDust(){
      gl.bindTexture(gl.TEXTURE_2D, dustTex);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
      gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, true);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, dustCanvas);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
      gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, false);
    }

    function updateUnderDust(dt){
      if (!underDust.length){
        if (!dustWasEmpty){
          dustCtx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
          uploadDust();
          dustWasEmpty = true;
        }
        return;
      }
      dustWasEmpty = false;
      dustCtx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
      dustCtx.globalCompositeOperation = 'lighter';
      const light = isLight();
      const span = Math.max(1, waterHeight - surfaceY);
      for (let i = underDust.length - 1; i >= 0; i--){
        const d = underDust[i];
        d.age += dt;
        d.x += (d.vx + Math.sin(d.age * 0.0035 + d.phase) * 0.007) * dt;
        d.y += d.vy * dt;
        d.vy = Math.max(0.006, d.vy * Math.pow(0.9995, dt));  // water drag
        d.life -= dt * 0.00024;
        // flakes shed tinier fragments as they sink
        if (d.size > 0.7 && underDust.length < 150 && Math.random() < dt * 0.0011){
          d.size *= 0.72;
          underDust.push({
            x: d.x + (Math.random() - 0.5) * 3,
            y: d.y + Math.random() * 2,
            vx: d.vx + (Math.random() - 0.5) * 0.012,
            vy: d.vy * (0.5 + Math.random() * 0.4),
            hue: (d.hue + 24 + Math.random() * 40) % 360,
            size: d.size * (0.55 + Math.random() * 0.3),
            life: Math.min(1, d.life + 0.1),
            age: 0,
            phase: Math.random() * Math.PI * 2
          });
        }
        const depth = clamp01((d.y - surfaceY) / span);
        const twinkle = 0.72 + 0.28 * Math.sin(d.age * 0.011 + d.phase);
        const alpha = Math.max(0, d.life) * (1 - depth * 0.55) * twinkle * 0.9;
        if (alpha <= 0.015 || d.y > waterHeight + 6){
          underDust.splice(i, 1);
          continue;
        }
        const size = Math.max(0.22, d.size * (1 - depth * 0.3));
        // cream theme needs deeper, more saturated flecks to read against the page
        const sat = (light ? 78 : 82) - depth * (light ? 18 : 34);
        const lig = light ? 50 - depth * 6 : 72 - depth * 10;
        dustCtx.shadowBlur = 5 + (1 - depth) * 4;
        dustCtx.shadowColor = 'hsla(' + d.hue.toFixed(1) + ', ' + sat.toFixed(1) + '%, ' + lig.toFixed(1) + '%, ' + (alpha * 0.8).toFixed(3) + ')';
        dustCtx.fillStyle = 'hsla(' + d.hue.toFixed(1) + ', ' + sat.toFixed(1) + '%, ' + lig.toFixed(1) + '%, ' + alpha.toFixed(3) + ')';
        dustCtx.beginPath();
        dustCtx.ellipse(d.x, d.y, size * 1.4, size * 0.6, d.phase + d.age * 0.002, 0, Math.PI * 2);
        dustCtx.fill();
      }
      dustCtx.shadowBlur = 0;
      dustCtx.globalCompositeOperation = 'source-over';
      uploadDust();
    }

    function step(applyDrops){
      gl.useProgram(stepProg);
      gl.bindVertexArray(vao);
      gl.viewport(0, 0, simW, simH);
      gl.bindFramebuffer(gl.FRAMEBUFFER, texB.f);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texA.t);
      gl.uniform1i(su.prev, 0);
      gl.uniform2f(su.texel, 1 / simW, 1 / simH);
      gl.uniform2f(su.simSize, simW, simH);
      const n = applyDrops ? Math.min(10, pending.length / 4) : 0;
      gl.uniform1i(su.dropCount, n);
      if (n) gl.uniform4fv(su.drops, new Float32Array(pending.slice(0, n * 4)));
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      const tmp = texA; texA = texB; texB = tmp;
    }

    function render(time){
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.clearColor(0, 0, 0, 0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(drawProg);
      gl.bindVertexArray(vao);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texA.t);
      gl.activeTexture(gl.TEXTURE1);
      gl.bindTexture(gl.TEXTURE_2D, reflTex);
      gl.activeTexture(gl.TEXTURE2);
      gl.bindTexture(gl.TEXTURE_2D, dustTex);
      gl.uniform1i(du.height, 0);
      gl.uniform1i(du.refl, 1);
      gl.uniform1i(du.dust, 2);
      gl.uniform2f(du.size, waterWidth, waterHeight);
      gl.uniform1f(du.surfaceY, surfaceY);
      gl.uniform1f(du.time, time);
      const light = isLight();
      if (light) gl.uniform3f(du.lineCol, 34 / 255, 92 / 255, 104 / 255);
      else gl.uniform3f(du.lineCol, 205 / 255, 229 / 255, 228 / 255);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    }

    function drawSimOverlay(time, dt){
      waterCtx.clearRect(0, 0, waterWidth, waterHeight);
      const light = isLight();
      const line = light ? '34, 92, 104' : '205, 229, 228';
      const glow = light ? '55, 112, 122' : '173, 211, 214';
      simEnergy *= Math.pow(0.998, dt);
      // fade in from zero above the line — a hard gradient start reads as a
      // second horizon line floating above the real water surface
      const gradTop = surfaceY - 36;
      const surfaceGrad = waterCtx.createLinearGradient(0, gradTop, 0, waterHeight);
      const lineStop = Math.min(1, 36 / Math.max(1, waterHeight - gradTop));
      surfaceGrad.addColorStop(0, 'rgba(' + glow + ', 0)');
      surfaceGrad.addColorStop(lineStop, 'rgba(' + glow + ', ' + ((light ? 0.035 : 0.045) + Math.min(0.05, simEnergy * 0.01)) + ')');
      surfaceGrad.addColorStop(1, 'rgba(' + glow + ', 0)');
      waterCtx.fillStyle = surfaceGrad;
      waterCtx.fillRect(0, Math.max(0, gradTop), waterWidth, waterHeight);
      drawDrops(dt, line);
    }

    function frame(time){
      const dt = Math.min(60, time - prevTime);
      prevTime = time;
      if (!simW || !texA || !texB){ requestAnimationFrame(frame); return; }

      const glow = brandGlowSignature(), light = isLight();
      if (glow !== lastGlow || light !== lastLight){
        lastGlow = glow;
        lastLight = light;
        reflDirty = true;
      }
      if (reflDirty && waterWidth){
        drawReflectionSource();
        uploadReflection();
        reflDirty = false;
      }

      accum = Math.min(accum + dt, 48);
      let first = true;
      while (accum >= 7){
        step(first);
        first = false;
        accum -= 7;
      }
      if (!first) pending.length = 0;

      updateUnderDust(dt);
      render(time);
      drawSimOverlay(time, dt);
      requestAnimationFrame(frame);
    }

    return { resize, disturb, frame, markDirty(){ reflDirty = true; } };
  }

  addEventListener('pointermove', e => {
    pointerX = e.clientX;
    pointerY = e.clientY;
    const waterRect = water.getBoundingClientRect();
    const localY = pointerY - waterRect.top;
    const wasInside = pointerInsideWater;
    pointerInsideWater = localY >= surfaceY - 16 && localY <= waterHeight;
    const movement = Math.hypot(pointerX - lastPointerX, pointerY - lastPointerY);
    if (pointerInsideWater && (e.buttons || movement > (simWater ? 2 : 8) || !wasInside)){
      const force = Math.min(2.4, 0.45 + movement * 0.035 + (e.buttons ? 0.8 : 0));
      if (disturbFromPointer(pointerX, pointerY, force) && movement > 3) sound.swish(force, pointerX);
    }
    lastPointerX = pointerX;
    lastPointerY = pointerY;
  }, { passive: true });

  addEventListener('pointerdown', e => {
    pointerX = e.clientX;
    pointerY = e.clientY;
    if (disturbFromPointer(pointerX, pointerY, 2.1)) sound.plop(2.1, pointerX);
  }, { passive: true });

  addEventListener('pointerleave', () => {
    pointerInsideWater = false;
  });

  /* ───── Intro — the brand surfaces ─────
     The logo drifts down from above on a slower ease (the deeper parallax
     layer) while "Mirumora" and STUDIO rise up through the waterline. A mask
     pinned at the waterline hides whatever is still submerged — letting a
     ghost of the type show through just below the surface — and small rings
     ripple out where the letters break through. */
  function runIntro(){
    if (reduced){
      // no vertical motion — just fade the brand in gently
      [mark, title, studio].forEach((el, i) => el.animate(
        [{ opacity: 0 }, { opacity: 1 }],
        { duration: 900, delay: i * 140, easing: 'ease-out', fill: 'backwards' }));
      return;
    }
    const waterRect = water.getBoundingClientRect();
    const surfaceScreen = waterRect.top + surfaceY;
    const heroRect = hero.getBoundingClientRect();
    const maskY = surfaceScreen - heroRect.top;   // waterline in hero-local coords
    if (maskY < 40) return;                       // layout too tight to stage the rise
    const rise = Math.max(60, surfaceScreen - title.getBoundingClientRect().top + 30);
    // the DOM type is fully hidden below the line — the underwater view comes
    // from the refraction texture (introWet), which the waves distort
    const maskCss = 'linear-gradient(to bottom, black 0, black ' + (maskY - 3).toFixed(1) + 'px, transparent ' + (maskY + 5).toFixed(1) + 'px)';
    hero.style.webkitMaskImage = maskCss;
    hero.style.maskImage = maskCss;
    introWet = true;
    // hold the type submerged for a beat so the refracted ghost registers
    // before it starts to rise
    const ease = 'cubic-bezier(0.33, 1, 0.55, 1)';
    const D = 2600, DELAY = 750;
    mark.animate(
      [{ transform: 'translateY(-44px)', opacity: 0 }, { transform: 'translateY(0)', opacity: 1 }],
      { duration: 2000, easing: ease, fill: 'backwards' });
    const riseFrames = [{ transform: 'translateY(' + rise.toFixed(1) + 'px)' }, { transform: 'translateY(0)' }];
    title.animate(riseFrames, { duration: D, delay: DELAY, easing: ease, fill: 'backwards' });
    studio.animate(riseFrames, { duration: D, delay: DELAY + 160, easing: ease, fill: 'backwards' });
    const start = performance.now();
    const total = DELAY + 160 + D + 60;
    let lastRing = 0;
    (function introFrame(now){
      if (simWater) simWater.markDirty();   // refraction + reflection track the moving type
      if (now - lastRing > 110){
        for (const el of [title, studio]){
          const r = el.getBoundingClientRect();
          if (r.top < surfaceScreen && r.bottom > surfaceScreen){
            lastRing = now;
            disturbFromMagicDust(r.left + Math.random() * r.width, surfaceScreen, 0.5 + Math.random() * 0.5);
            break;
          }
        }
      }
      if (now - start < total) requestAnimationFrame(introFrame);
      else {
        introWet = false;
        hero.style.webkitMaskImage = '';
        hero.style.maskImage = '';
        if (simWater) simWater.markDirty();
      }
    })(start);
  }

  // The intro must not play to a hidden tab: WAAPI runs on wall-clock time, so
  // a page opened in the background (local.sh's `open`, a cmd-click, a deploy
  // preview) would finish the whole sequence before anyone sees it. Wait for
  // visibility, then give the webfonts a beat to settle so measurements hold.
  function scheduleIntro(){
    const begin = () => {
      let started = false;
      const go = () => {
        if (started) return;
        started = true;
        requestAnimationFrame(() => runIntro());
      };
      if (document.fonts && document.fonts.ready){
        document.fonts.ready.then(go);
        setTimeout(go, 700);   // don't stall the intro on a slow font CDN
      } else go();
    };
    if (document.visibilityState !== 'hidden') begin();
    else {
      const onVis = () => {
        if (document.visibilityState !== 'hidden'){
          document.removeEventListener('visibilitychange', onVis);
          begin();
        }
      };
      document.addEventListener('visibilitychange', onVis);
    }
  }

  simWater = initSimWater();
  resizeWater();
  scheduleIntro();
  requestAnimationFrame(drawMagic);
  if (simWater){
    logoImg.addEventListener('load', () => simWater.markDirty(), { once: true });
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => simWater.markDirty());
    requestAnimationFrame(simWater.frame);
  } else {
    document.getElementById('waterSim').style.display = 'none';
    logoImg.addEventListener('load', () => drawWater(performance.now()), { once: true });
    requestAnimationFrame(drawWater);
  }

  addEventListener('resize', () => {
    clearTimeout(window.__rzt);
    window.__rzt = setTimeout(resizeWater, 120);
  });
})();
</script>
</body>
</html>
