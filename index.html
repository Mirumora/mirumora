<html lang="en">

<meta name="theme-color" content="#f3efe8" media="(prefers-color-scheme: light)">

<script>try{if(localStorage.getItem('mir-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>

<style>
:root{
  color-scheme: light dark;
  /* ── Light (cream) — the default ── */
  --ink:        #f3efe8;
  --bone:       #141413;
  --bone-dim:   #4f4b44;
  --muted:      #756f65;
  --line:       #cec7ba;
  --line-warm:  #a59d90;
  --vignette:   radial-gradient(120% 90% at 50% 28%, rgba(255,255,255,0.56) 0%, transparent 48%, rgba(70,61,48,0.12) 100%);
  --grain-opacity: 0.20;
  --cursor-line: rgba(20,20,19,0.90);
  --cta-line: rgba(20,20,19,0.78);
  --cta-fill: rgba(20,20,19,0.07);
  --logo-filter: none;
  --water-line: rgba(34, 92, 104, 0.28);
  --water-glow: rgba(55, 112, 122, 0.14);
}

:root[data-theme="dark"]{
  /* ── Dark (ink) ── */
  --ink:        #141413;
  --bone:       #f3efe8;
  --bone-dim:   #b6b0a3;
  --muted:      #7a766c;
  --line:       #2c2925;
  --line-warm:  #5a554c;
  --vignette:   radial-gradient(120% 90% at 50% 30%, transparent 0%, rgba(0,0,0,0.62) 100%);
  --grain-opacity: 0.38;
  --cursor-line: rgba(243,239,232,0.95);
  --cta-line: rgba(243,239,232,0.90);
  --cta-fill: rgba(243,239,232,0.10);
  --logo-filter: invert(1) brightness(1.05);
  --water-line: rgba(205, 229, 228, 0.25);
  --water-glow: rgba(173, 211, 214, 0.13);
}

*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden}
body{
  height: 100dvh;
  background: var(--ink);
  color: var(--bone);
  font: 15px/1.55 "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
}

/* stipple grain — fine CRT-static, near-uniform with a hint of bottom weight */
body::before{
  content:"";
  position: fixed; inset: 0;
  background-image: var(--grain, none);
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center;
  opacity: var(--grain-opacity);
  pointer-events: none;
  z-index: 2;
}
body::after{
  content:"";
  position: fixed; inset: 0;
  background: var(--vignette);
  pointer-events: none;
  z-index: 1;
}

/* cursor:none ONLY when JS confirms custom cursor is running */
body.has-custom-cursor,
body.has-custom-cursor *{ cursor: none !important; }

/* ── Custom cursor ───────────────────────── */
.cursor{
  position: fixed;
  left: 0; top: 0;
  width: 16px; height: 22px;
  border: 1px solid var(--cursor-line);
  border-radius: 2px;
  pointer-events: none;
  z-index: 9999;
  transform: translate3d(-100px, -100px, 0);
  transition: opacity .22s ease,
              width .22s cubic-bezier(.2,.8,.2,1),
              height .22s cubic-bezier(.2,.8,.2,1);
  mix-blend-mode: difference;
  will-change: transform;
}
.cursor.is-down{ width: 12px; height: 16px; }
.cursor.is-cta{ opacity: 0; }

/* ── CTA outline ────────────────────────── */
@property --sweep-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}
@property --lit-strength {
  syntax: '<number>';
  initial-value: 0;
  inherits: false;
}
[data-cta]{
  position: relative;
  display: inline-block;
}
[data-cta]::before{
  content:"";
  position: absolute;
  inset: -8px -14px;
  border: 1px solid transparent;
  border-radius: 4px;
  pointer-events: none;
  background-color: transparent;
  transition: border-color .25s ease,
              inset .35s cubic-bezier(.2,.8,.2,1),
              background-color .18s ease-out;
}
[data-cta]:hover::before,
[data-cta].is-focus::before{
  border-color: var(--cta-line);
  inset: -13px -22px;
}
/* click flash — brief inner fill on press */
[data-cta]:active::before{
  background-color: var(--cta-fill);
  transition: background-color .08s ease-out,
              border-color .25s ease,
              inset .35s cubic-bezier(.2,.8,.2,1);
}
/* traveling color sweep around the outline */
[data-cta]::after{
  content:"";
  position: absolute;
  inset: -8px -14px;
  border-radius: 4px;
  padding: 1.4px;
  background: conic-gradient(from var(--sweep-angle),
    transparent 0%,
    hsla(15, 70%, 75%, 0.95) 5%,
    hsla(45, 65%, 78%, 0.95) 10%,
    hsla(120, 50%, 75%, 0.95) 16%,
    hsla(190, 55%, 75%, 0.95) 22%,
    hsla(260, 50%, 78%, 0.95) 28%,
    hsla(320, 55%, 78%, 0.95) 34%,
    transparent 42%);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  mask-composite: exclude;
  opacity: 0;
  transition: opacity .35s ease,
              inset .35s cubic-bezier(.2,.8,.2,1);
  pointer-events: none;
}
[data-cta]:hover::after,
[data-cta].is-focus::after{
  opacity: 1;
  inset: -13px -22px;
  animation: cta-sweep 2.2s linear infinite;
}
[data-cta].is-launching::after{
  opacity: 1;
  inset: -13px -22px;
  animation: cta-sweep 0.55s linear infinite;
}
[data-cta].is-launching .ch{
  transition-duration: 0.18s !important;
  transition-delay: calc(var(--i, 0) * 14ms) !important;
}
@keyframes cta-sweep {
  to { --sweep-angle: 360deg; }
}

/* ── Per-letter color wash ────────────── */
.split .ch{
  display: inline-block;
  color: inherit;
  transition: color .18s ease, text-shadow .18s ease;
}
.split .ch.sp{ width: 0.28em; }
.split.is-local-lit .ch{
  transition-duration: .12s;
}

/* ── App layout ─────────────────────────── */
.app{
  position: relative;
  z-index: 3;
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* bottom-right light/dark toggle */
.theme-toggle{
  position: absolute;
  bottom: 22px;
  right: 32px;
  z-index: 6;
  background: transparent;
  border: 0;
  color: var(--bone-dim);
  font-family: "Hanken Grotesk", -apple-system, sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  padding: 6px 0;
  display: inline-flex;
  align-items: center;
  gap: 9px;
  transition: color .25s ease;
}
.theme-toggle:hover{ color: var(--bone); }
.theme-toggle .dot{
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 1px solid currentColor;
  background:
    linear-gradient(90deg, currentColor 0 50%, transparent 50% 100%);
  transition: transform .3s cubic-bezier(.2,.8,.2,1);
}
:root[data-theme="dark"] .theme-toggle .dot{ transform: rotate(180deg); }
.sound-toggle{ right: 132px; }
.sound-toggle .sdot{
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 1px solid currentColor;
  background: currentColor;
  transition: background .25s ease;
}
.sound-toggle.is-muted .sdot{ background: transparent; }

/* top-right menu */
.menu{
  position: absolute;
  top: 26px;
  right: 32px;
  z-index: 6;
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
}
.menu-toggle{
  background: transparent;
  border: 0;
  color: var(--bone-dim);
  font: inherit;
  letter-spacing: inherit;
  text-transform: inherit;
  padding: 4px 0;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.menu-toggle .arrow{
  display: inline-block;
  transition: transform .25s ease;
}
.menu.is-open .menu-toggle{ color: var(--bone); }
.menu.is-open .menu-toggle .arrow{ transform: rotate(90deg); }
.menu-panel{
  position: absolute;
  top: 36px;
  right: 0;
  min-width: 200px;
  padding: 16px 4px 8px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  opacity: 0;
  transform: translateY(-6px);
  pointer-events: none;
  transition: opacity .25s ease, transform .25s ease;
}
.menu.is-open .menu-panel{
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.menu-panel a{
  color: var(--bone);
  text-decoration: none;
  font-family: "Playfair Display", Georgia, serif;
  font-size: 22px;
  font-style: italic;
  font-weight: 400;
  letter-spacing: 0;
  text-transform: none;
  padding: 4px 0;
}
.menu-panel .menu-sep{
  width: 80px;
  height: 1px;
  background: var(--line);
  margin: 10px 0 6px;
  align-self: flex-end;
}
.menu-panel .menu-meta{
  font-family: "Playfair Display", Georgia, serif;
  font-style: italic;
  font-size: 14px;
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--muted);
  padding: 2px 0;
}
.menu-panel a.menu-meta{
  color: var(--muted);
  text-decoration: none;
  text-transform: none;
}

/* ── Hero ────────────────────────────────── */
.hero{
  text-align: center;
  max-width: 760px;
  padding: 0 32px;
  margin-top: -18vh;
  z-index: 4;
  position: relative;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
}
/* logo mark — coloured via mask so it can go rainbow on hover/click */
.hero .mark{
  --lit-x: 50%;
  --lit-y: 50%;
  --lit-strength: 0;
  height: clamp(96px, 17vh, 168px);
  aspect-ratio: 467 / 1277;
  margin-bottom: clamp(22px, 3.2vh, 38px);
  background:
    radial-gradient(circle at var(--lit-x) var(--lit-y),
      hsla(15, 75%, 62%, calc(var(--lit-strength) * 0.95)) 0%,
      hsla(48, 78%, 62%, calc(var(--lit-strength) * 0.9)) 13%,
      hsla(128, 52%, 58%, calc(var(--lit-strength) * 0.82)) 25%,
      hsla(192, 64%, 60%, calc(var(--lit-strength) * 0.72)) 38%,
      hsla(262, 54%, 66%, calc(var(--lit-strength) * 0.55)) 52%,
      hsla(322, 64%, 66%, calc(var(--lit-strength) * 0.28)) 66%,
      transparent 78%),
    var(--bone);
  -webkit-mask: url('assets/Logo.svg') no-repeat center / contain;
  mask: url('assets/Logo.svg') no-repeat center / contain;
  pointer-events: auto;
  /* strength is eased per-frame in JS — a CSS transition here would double-lag it */
}

.hero h1{
  font-family: "Playfair Display", Georgia, serif;
  font-weight: 500;
  font-size: clamp(52px, 8vw, 96px);
  line-height: 1.0;
  letter-spacing: 0.005em;
  pointer-events: auto;
}
.hero .studio{
  margin-top: clamp(10px, 1.4vh, 16px);
  font-family: "Hanken Grotesk", -apple-system, sans-serif;
  font-weight: 300;
  font-size: clamp(13px, 1.2vw, 18px);
  letter-spacing: 0.42em;
  text-indent: 0.42em;
  color: var(--bone-dim);
  pointer-events: auto;
}

/* ── Quiet interactive water ─────────────── */
.water-plane{
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100%;
  height: 62vh;
  z-index: 3;
  pointer-events: none;
  opacity: 0.92;
  filter: saturate(0.92);
}
.magic-plane{
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 5;
  pointer-events: none;
}

/* bottom anchors */
.anchor{
  position: absolute;
  bottom: 24px;
  z-index: 5;
  font-size: 10px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--bone-dim);
  pointer-events: none;
}
.anchor-bl{ left: 32px; }

@media (max-width: 600px){
  .menu{ top: 22px; right: 22px; }
  .anchor{ bottom: 18px; font-size: 9px; }
  .anchor-bl{ left: 22px; letter-spacing: 0.24em; }
  .theme-toggle{ right: 22px; bottom: 16px; font-size: 9px; letter-spacing: 0.24em; }
  .sound-toggle{ right: 104px; }
  .hero{ padding: 0 22px; margin-top: -12vh; }
  .menu-panel{ min-width: 170px; }
  .menu-panel a, .menu-panel .soon{ font-size: 20px; }
  .water-plane{ height: 56vh; }
}

@media (prefers-reduced-motion: reduce){
  .cursor{ display: none; }
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="app">

  <nav class="menu" id="menu">
    <button class="menu-toggle" data-cta data-menu-toggle aria-expanded="false">
      Menu <span class="arrow">›</span>
    </button>
    <div class="menu-panel" role="menu">
      <a href="products/" data-cta data-split>Products</a>
      <a href="agents/" data-cta data-split>For Agents</a>
      <a href="about/" data-cta data-split>About</a>
      <div class="menu-sep"></div>
      <span class="menu-meta">@mirumora</span>
      <a href="mailto:hello@mirumora.com" data-cta class="menu-meta">hello@mirumora.com</a>
    </div>
  </nav>

  <canvas class="water-plane" id="waterSim" aria-hidden="true"></canvas>
  <canvas class="water-plane" id="waterPlane" aria-hidden="true"></canvas>
  <canvas class="magic-plane" id="magicPlane" aria-hidden="true"></canvas>

  <main class="hero">
    <div class="mark" data-lit role="img" aria-label="Mirumora Studio mark"></div>
    <h1 data-split data-lit>Mirumora</h1>
    <p class="studio" data-split data-lit>STUDIO</p>
  </main>

  <div class="anchor anchor-bl">Mirumora</div>

  <button class="theme-toggle sound-toggle" id="soundToggle" data-cta aria-label="Toggle sound">
    <span class="sdot" aria-hidden="true"></span><span class="slabel">Sound</span>
  </button>

  <button class="theme-toggle" id="themeToggle" data-cta aria-label="Toggle light or dark mode">
    <span class="dot" aria-hidden="true"></span><span class="tlabel">Light</span>
  </button>

</div>

<script>
(function(){
  const root = document.documentElement;
  const THEME_KEY = 'mir-theme';
  function isLight(){ return root.getAttribute('data-theme') !== 'dark'; }

  /* ───── Stipple grain — fine CRT static, dense but soft ───── */
  function ensureGrain(){
    const light = isLight();
    const KEY = light ? 'mir-grain-v1-light' : 'mir-grain-v1-dark';
    let url = null;
    try { url = localStorage.getItem(KEY); } catch(e){}
    if (!url){
      const W = 1200, H = 900;
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      const ctx = c.getContext('2d');
      for (let y = 0; y < H; y++){
        const yn = y / H;
        // dense uniform static (~5%) with subtle bottom weight (+2%)
        const density = 0.055 + Math.pow(yn, 2.2) * 0.022;
        for (let x = 0; x < W; x++){
          if (Math.random() < density){
            const a = 0.18 + Math.random() * 0.22;   // soft per-particle alpha
            const grain = light ? '20, 20, 19' : '243, 239, 232';
            ctx.fillStyle = `rgba(${grain}, ${a.toFixed(3)})`;
            ctx.fillRect(x, y, 1, 1);
          }
        }
      }
      url = c.toDataURL('image/png');
      try { localStorage.setItem(KEY, url); } catch(e){}
    }
    document.body.style.setProperty('--grain', `url("${url}")`);
  }
  /* ───── Theme: manual light/dark, defaults to light ───── */
  function applyTheme(t){
    root.setAttribute('data-theme', t);
    try { localStorage.setItem(THEME_KEY, t); } catch(e){}
    const label = document.querySelector('#themeToggle .tlabel');
    if (label) label.textContent = t === 'dark' ? 'Dark' : 'Light';
    ensureGrain();
  }
  let storedTheme = null;
  try { storedTheme = localStorage.getItem(THEME_KEY); } catch(e){}
  applyTheme(storedTheme === 'dark' ? 'dark' : 'light');
  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle){
    themeToggle.addEventListener('click', e => {
      applyTheme(isLight() ? 'dark' : 'light');
      sound.tick(e.clientX);
    });
  }

  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ───── Sound design — procedural Web Audio, no samples ─────
     Everything is synthesized live: water interactions use layered droplet
     chains with randomized impulse density, bubble-like pitch curves, noise
     transients, and turbulence beds. Dust lands as tiny wet plinks, and clicks
     bloom into a bell arpeggio over a warm low swell. The context is created
     lazily on the first user gesture (browser autoplay policy). */
  const sound = (function(){
    const KEY = 'mir-sound';
    let muted = false;
    try { muted = localStorage.getItem(KEY) === 'off'; } catch(e){}
    let ctx = null, master = null, verbSend = null, analyser = null;
    let noiseBuf = null;
    let lastSwish = 0, lastPlink = 0;
    const PENTA = [880, 987.77, 1108.73, 1318.51, 1479.98, 1760];  // A major pentatonic

    function ensure(){
      if (ctx) return true;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = 0.5;
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -26;
      comp.knee.value = 24;
      comp.ratio.value = 5;
      master.connect(comp);
      comp.connect(ctx.destination);
      analyser = ctx.createAnalyser();
      analyser.fftSize = 512;
      comp.connect(analyser);
      // soft procedural reverb tail shared by every voice
      const verb = ctx.createConvolver();
      const len = Math.floor(ctx.sampleRate * 1.7);
      const impulse = ctx.createBuffer(2, len, ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++){
        const data = impulse.getChannelData(ch);
        for (let i = 0; i < len; i++){
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.6);
        }
      }
      verb.buffer = impulse;
      verbSend = ctx.createGain();
      verbSend.gain.value = 0.5;
      verbSend.connect(verb);
      verb.connect(master);
      noiseBuf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
      const nd = noiseBuf.getChannelData(0);
      for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
      return true;
    }

    function unlock(){
      if (muted || !ensure()) return;
      if (ctx.state === 'suspended') ctx.resume();
    }

    function ok(){
      if (muted || !ctx) return false;
      if (ctx.state === 'suspended') ctx.resume();
      return ctx.state === 'running';
    }

    function voice(x, wet){
      const g = ctx.createGain();
      let tail = g;
      if (ctx.createStereoPanner){
        const p = ctx.createStereoPanner();
        p.pan.value = Math.max(-0.8, Math.min(0.8, ((x == null ? innerWidth / 2 : x) / innerWidth) * 1.6 - 0.8));
        g.connect(p);
        tail = p;
      }
      tail.connect(master);
      if (wet){
        const w = ctx.createGain();
        w.gain.value = wet;
        tail.connect(w);
        w.connect(verbSend);
      }
      return g;
    }

    function noiseSrc(){
      const n = ctx.createBufferSource();
      n.buffer = noiseBuf;
      n.loop = true;
      n.playbackRate.value = 0.85 + Math.random() * 0.3;
      return n;
    }

    function bandNoise(at, dur, x, amp, low, high, q, wet){
      const n = noiseSrc();
      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = low * (0.85 + Math.random() * 0.3);
      hp.Q.value = 0.7 + Math.random() * 0.8;
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = high * (0.88 + Math.random() * 0.24);
      lp.Q.value = 0.55 + Math.random() * 0.75;
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      // splash noise darkens as the energy dissipates — a static filter is
      // the giveaway that it's synthetic
      const fc = Math.sqrt(low * high);
      bp.frequency.setValueAtTime(fc * (1.05 + Math.random() * 0.35), at);
      bp.frequency.exponentialRampToValueAtTime(fc * (0.55 + Math.random() * 0.25), at + dur);
      bp.Q.value = q || 0.9;
      const g = voice(x, wet == null ? 0.35 : wet);
      g.gain.setValueAtTime(0.0001, at);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0002, amp), at + Math.min(0.035, dur * 0.22));
      g.gain.exponentialRampToValueAtTime(0.0001, at + dur);
      n.connect(hp);
      hp.connect(lp);
      lp.connect(bp);
      bp.connect(g);
      n.start(at);
      n.stop(at + dur + 0.03);
    }

    function waterDroplet(at, x, opts){
      opts = opts || {};
      const band = opts.band || 'mid';
      const ranges = {
        low: [95, 245],
        mid: [280, 1300],
        high: [1700, 6500]
      };
      const r = ranges[band] || ranges.mid;
      const size = opts.size == null ? 1 : opts.size;
      const velocity = opts.velocity == null ? 1 : opts.velocity;
      const base = r[0] * Math.pow(r[1] / r[0], Math.random());
      // Real plinks are 15–150ms; longer pitch-swept sines read as slide whistles.
      const dur = (band === 'low' ? 0.08 + Math.random() * 0.09
                 : band === 'high' ? 0.018 + Math.random() * 0.032
                 : 0.03 + Math.random() * 0.05) * (0.8 + size * 0.3);
      const amp = (opts.amp == null ? 0.014 : opts.amp) * velocity * (band === 'low' ? 0.9 : band === 'high' ? 0.62 : 1);
      const g = voice(x, opts.wet == null ? 0.45 : opts.wet);
      const o = ctx.createOscillator();
      o.type = 'sine';
      // Bubble entrainment: pitch rises as the bubble contracts, but each real
      // droplet follows its own bent, wobbly curve — identical two-point ramps
      // are what makes a droplet field sound sequenced.
      const N = 9;
      const curve = new Float32Array(N);
      const rise = 0.25 + Math.random() * 0.9;
      const dip = Math.random() * 0.22;
      for (let i = 0; i < N; i++){
        const p = i / (N - 1);
        const wobble = 1 + (Math.random() - 0.5) * 0.05;
        curve[i] = base * (0.9 - dip * Math.sin(Math.PI * Math.min(1, p * 2.5)) + rise * Math.pow(p, 1.6)) * wobble;
      }
      o.frequency.setValueCurveAtTime(curve, at, dur);
      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = Math.max(35, base * (0.45 + Math.random() * 0.2));
      hp.Q.value = 0.7 + Math.random() * 0.6;
      g.gain.setValueAtTime(0.0001, at);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0002, amp), at + 0.003 + Math.random() * 0.006);
      g.gain.exponentialRampToValueAtTime(0.0001, at + dur);
      o.connect(hp);
      hp.connect(g);
      o.start(at);
      o.stop(at + dur + 0.025);
      // faint inharmonic upper partial keeps the drop from reading as a pure tone
      const ratio = 2.2 + Math.random() * 0.9;
      if (base * ratio < 9000){
        const o2 = ctx.createOscillator();
        o2.type = 'sine';
        const c2 = new Float32Array(N);
        for (let i = 0; i < N; i++) c2[i] = curve[i] * ratio;
        o2.frequency.setValueCurveAtTime(c2, at, dur);
        const g2 = ctx.createGain();
        g2.gain.value = 0.10 + Math.random() * 0.12;
        o2.connect(g2);
        g2.connect(hp);
        o2.start(at);
        o2.stop(at + dur + 0.025);
      }
      if (Math.random() < (opts.noiseChance == null ? 0.5 : opts.noiseChance)){
        const low = band === 'low' ? 120 : band === 'mid' ? 500 : 2400;
        const high = band === 'low' ? 500 : band === 'mid' ? 3200 : 10000;
        bandNoise(at, 0.02 + Math.random() * 0.04, x, amp * (0.3 + Math.random() * 0.4), low, high, 0.8 + Math.random() * 1.2, 0.4);
      }
    }

    function waterCluster(x, force, profile){
      if (!ok()) return;
      const t = ctx.currentTime;
      const origin = x == null ? innerWidth / 2 : x;
      const f = Math.max(0.2, Math.min(2.8, force || 1));
      const isDrag = profile === 'drag';
      if (isDrag){
        // flow is mostly turbulence: a soft mid-band wash, droplets only as accents
        bandNoise(t, 0.20 + Math.random() * 0.10, origin, 0.0030 + f * 0.0028, 170, 1100 + f * 600, 0.65, 0.22);
      } else {
        // impact: cavity thump (short downward sine) + splash burst
        const f0 = 200 - f * 30 + Math.random() * 30;
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(f0 * 1.5, t);
        o.frequency.exponentialRampToValueAtTime(f0 * 0.6, t + 0.10);
        const g = voice(origin, 0.4);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.018 + f * 0.014, t + 0.009);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
        o.connect(g);
        o.start(t); o.stop(t + 0.22);
        // splash in two layers: bright initial burst, then a darker wet tail —
        // real splashes carry more noise than tone
        bandNoise(t, 0.045 + f * 0.02, origin, 0.006 + f * 0.005, 900, 9000, 0.8, 0.32);
        bandNoise(t + 0.018, 0.13 + f * 0.05, origin, 0.004 + f * 0.003, 280, 2600, 0.7, 0.42);
      }
      const count = isDrag
        ? (Math.random() < 0.45 ? 1 + ((Math.random() * 2) | 0) : 0)
        : 4 + ((f * 2) | 0);
      for (let i = 0; i < count; i++){
        const r = Math.random();
        const band = isDrag
          ? (r < 0.6 ? 'mid' : 'high')
          : (r < 0.12 ? 'low' : r < 0.58 ? 'mid' : 'high');
        // tap drips trail the splash, early-weighted and fading with delay
        const delay = isDrag ? Math.random() * 0.07 : 0.02 + Math.pow(Math.random(), 1.6) * 0.30;
        const px = origin + (Math.random() - 0.5) * (isDrag ? 70 : 44);
        const fade = isDrag ? 1 : 1 - delay * 2;
        waterDroplet(t + delay, px, {
          band,
          amp: (isDrag ? 0.0045 : 0.009) * f * fade * (0.6 + Math.random() * 0.8),
          velocity: 0.7 + Math.random() * f * 0.5,
          wet: band === 'high' ? 0.7 : 0.5,
          noiseChance: isDrag ? 0.25 : 0.5
        });
      }
    }

    function bell(freq, at, amp, x){
      const g = voice(x, 0.8);
      const o = ctx.createOscillator();
      o.type = 'sine';
      o.frequency.value = freq * (0.996 + Math.random() * 0.008);
      const o2 = ctx.createOscillator();
      o2.type = 'sine';
      o2.frequency.value = freq * 3.01;
      const g2 = ctx.createGain();
      g2.gain.value = 0.22;
      o2.connect(g2);
      g2.connect(g);
      g.gain.setValueAtTime(0, at);
      g.gain.linearRampToValueAtTime(amp, at + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, at + 1.1);
      o.connect(g);
      o.start(at); o.stop(at + 1.2);
      o2.start(at); o2.stop(at + 1.2);
    }

    return {
      unlock,
      get muted(){ return muted; },
      toggle(){
        muted = !muted;
        try { localStorage.setItem(KEY, muted ? 'off' : 'on'); } catch(e){}
        if (!muted){
          unlock();
          if (ok()) bell(PENTA[2], ctx.currentTime, 0.03, innerWidth - 100);
        }
        return muted;
      },
      level(){
        if (!analyser) return 0;
        const buf = new Uint8Array(analyser.fftSize);
        analyser.getByteTimeDomainData(buf);
        let sum = 0;
        for (let i = 0; i < buf.length; i++){ const v = (buf[i] - 128) / 128; sum += v * v; }
        return Math.sqrt(sum / buf.length);
      },

      // water tap — cavity thump + splash burst + a sparse trail of droplet chirps
      plop(force, x){
        waterCluster(x, force, 'tap');
      },

      // dragging through the water — a turbulence wash with sparse droplet accents
      swish(force, x){
        if (!ok()) return;
        const t = ctx.currentTime;
        if (t - lastSwish < 0.09) return;
        lastSwish = t;
        waterCluster(x, Math.min(1.6, force * 0.72), 'drag');
      },

      // a dust flake meets the water — tiny wet plink, far away in the reverb
      plink(x, size){
        if (!ok()) return;
        const t = ctx.currentTime;
        size = size == null ? 0.8 : size;
        if (t - lastPlink < 0.045 || Math.random() < 0.35) return;
        lastPlink = t;
        waterDroplet(t, x, {
          band: Math.random() < 0.82 ? 'high' : 'mid',
          amp: 0.008 + Math.min(0.018, size * 0.009),
          velocity: 0.7 + Math.random() * 0.8,
          size: 0.45 + size * 0.45,
          wet: 0.9,
          noiseChance: 0.42
        });
        if (size > 1 || Math.random() < 0.28){
          waterDroplet(t + 0.028 + Math.random() * 0.055, x + (Math.random() - 0.5) * 28, {
            band: 'mid',
            amp: 0.004 + size * 0.003,
            velocity: 0.55 + Math.random() * 0.55,
            size: 0.55,
            wet: 0.82,
            noiseChance: 0.25
          });
        }
      },

      // click pulse — ascending bell arpeggio over a warm swell that lingers
      chime(x){
        if (!ok()) return;
        const t = ctx.currentTime;
        const rootIdx = (Math.random() * 3) | 0;
        [0, 1, 2, 4].forEach((step, i) => {
          const idx = rootIdx + step;
          const f = PENTA[idx % PENTA.length] * (idx >= PENTA.length ? 2 : 1) / 2;
          bell(f, t + i * 0.07, 0.028, x);
        });
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.value = 110 + Math.random() * 8;
        const g = voice(x, 0.4);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.030, t + 0.30);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 2.2);
        o.connect(g);
        o.start(t); o.stop(t + 2.4);
      },

      // the glow catches — a soft airy sweep upward
      shimmer(x){
        if (!ok()) return;
        const t = ctx.currentTime;
        const n = noiseSrc();
        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.Q.value = 2.2;
        bp.frequency.setValueAtTime(900, t);
        bp.frequency.exponentialRampToValueAtTime(2400, t + 0.35);
        const g = voice(x, 0.7);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.012, t + 0.08);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
        n.connect(bp);
        bp.connect(g);
        n.start(t); n.stop(t + 0.55);
      },

      // menus and toggles — one soft woody tick
      tick(x){
        if (!ok()) return;
        const t = ctx.currentTime;
        const n = noiseSrc();
        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 1900 + Math.random() * 300;
        bp.Q.value = 4;
        const g = voice(x, 0.25);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.030, t + 0.004);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
        n.connect(bp);
        bp.connect(g);
        n.start(t); n.stop(t + 0.09);
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.value = 620 + Math.random() * 60;
        const og = voice(x, 0.3);
        og.gain.setValueAtTime(0, t);
        og.gain.linearRampToValueAtTime(0.016, t + 0.006);
        og.gain.exponentialRampToValueAtTime(0.0001, t + 0.11);
        o.connect(og);
        o.start(t); o.stop(t + 0.13);
      }
    };
  })();
  window.__mirSound = sound;   // small debug handle (used by automated checks)

  addEventListener('pointerdown', () => sound.unlock(), { passive: true });
  addEventListener('keydown', () => sound.unlock());

  const soundToggle = document.getElementById('soundToggle');
  function reflectSoundState(){
    soundToggle.classList.toggle('is-muted', sound.muted);
    const slabel = soundToggle.querySelector('.slabel');
    if (slabel) slabel.textContent = sound.muted ? 'Muted' : 'Sound';
  }
  reflectSoundState();
  soundToggle.addEventListener('click', () => {
    sound.toggle();
    reflectSoundState();
  });

  // Robust detection: only show custom cursor on devices with a primary mouse-like pointer
  const finePointer = matchMedia('(hover: hover) and (pointer: fine)').matches;
  const canCustomCursor =
    finePointer && !reduced;

  /* ───── Cursor ───── */
  const cursor = document.getElementById('cursor');
  let cx = innerWidth / 2, cy = innerHeight / 2;
  let tx = cx, ty = cy;
  let cursorX = cx, cursorY = cy;
  let mouseMoved = false;

  function onMouseMove(e){
    tx = e.clientX; ty = e.clientY;
    cursorX = e.clientX; cursorY = e.clientY;
    mouseMoved = true;
  }

  if (canCustomCursor){
    try {
      document.body.classList.add('has-custom-cursor');
      addEventListener('mousemove', onMouseMove, { passive: true });
      addEventListener('mousedown', () => cursor.classList.add('is-down'));
      addEventListener('mouseup', () => cursor.classList.remove('is-down'));
      (function tick(){
        cx += (tx - cx) * 0.30;
        cy += (ty - cy) * 0.30;
        cursor.style.transform =
          `translate3d(${cx}px, ${cy}px, 0) translate(-50%, -50%)`;
        requestAnimationFrame(tick);
      })();
    } catch (err){
      document.body.classList.remove('has-custom-cursor');
      cursor.style.display = 'none';
    }
  } else {
    cursor.style.display = 'none';
    // still track for gather mode (touch devices use touchmove handler below)
    addEventListener('mousemove', onMouseMove, { passive: true });
  }

  /* CTA hover */
  document.querySelectorAll('[data-cta]').forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursor.classList.add('is-cta');
      el.classList.add('is-focus');

      cursor.classList.remove('is-cta');
      el.classList.remove('is-focus');
    });
  });

  /* Per-letter splitter — preserves nested tags (e.g. <em>) */
  function splitElement(el){
    if (el.classList.contains('split')) return;
    let i = 0;
    function walk(node){
      if (node.nodeType === 3){
        const text = node.textContent;
        const frag = document.createDocumentFragment();
        for (const ch of text){
          const span = document.createElement('span');
          if (ch === ' '){
            span.className = 'ch sp';
          } else {
            span.className = 'ch';
            span.textContent = ch;
          }
          span.style.setProperty('--i', i++);
          frag.appendChild(span);
        }
        node.parentNode.replaceChild(frag, node);
      } else if (node.nodeType === 1 && node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE'){
        [...node.childNodes].forEach(walk);
      }
    }
    walk(el);
    el.classList.add('split');
  }
  document.querySelectorAll('[data-split]').forEach(splitElement);

  /* Local rainbow source — the glow chases the cursor with easing, lingers
     after it leaves, and a click fires a pulse that ripples out through the
     letters plus a breathing afterglow pinned at the click point. All motion
     happens per-frame in animateBrandGlow, so nothing snaps. */
  const brandGlow = {
    target: null,    // where the pointer is right now
    current: null,   // eased glow chasing the target
    pinned: null,    // click-pinned breathing afterglow
    fading: [],      // glows still easing out
    pulses: [],      // click shockwaves radiating through the letters
    emitClock: 0
  };

  function markReflectionDirty(){
    if (simWater) simWater.markDirty();
  }

  function clamp01(n){
    return Math.max(0, Math.min(1, n));
  }

  function localHue(distance){
    return (15 + distance * 1.85) % 360;
  }

  function pulseRadius(p){ return p.age * 0.30; }
  function pulseFade(p){ return Math.pow(1 - p.age / p.life, 1.6); }

  function glowSourcesFor(el, time){
    const list = [];
    if (brandGlow.current && brandGlow.current.el === el && brandGlow.current.strength > 0.015) list.push(brandGlow.current);
    if (brandGlow.pinned && brandGlow.pinned.el === el){
      list.push({ x: brandGlow.pinned.x, y: brandGlow.pinned.y, strength: 0.62 + Math.sin(time * 0.0019) * 0.16 });
    }
    for (const g of brandGlow.fading){
      if (g.el === el && g.strength > 0.015) list.push(g);
    }
    return list;
  }

  function applyMarkGlow(sources, pulses){
    let strength = 0, best = null;
    for (const s of sources){
      if (s.strength > strength){ strength = s.strength; best = s; }
    }
    let total = Math.min(1.15, sources.reduce((sum, s) => sum + s.strength, 0));
    for (const p of pulses) total = Math.min(1.3, total + pulseFade(p) * 0.85);
    const anchor = best || (pulses.length ? pulses[pulses.length - 1] : null);
    if (!anchor || total <= 0.015){
      mark.style.setProperty('--lit-strength', '0');
      return;
    }
    const rect = mark.getBoundingClientRect();
    mark.style.setProperty('--lit-x', (clamp01((anchor.x - rect.left) / Math.max(1, rect.width)) * 100).toFixed(2) + '%');
    mark.style.setProperty('--lit-y', (clamp01((anchor.y - rect.top) / Math.max(1, rect.height)) * 100).toFixed(2) + '%');
    mark.style.setProperty('--lit-strength', total.toFixed(3));
  }

  function applySplitGlow(el, sources, pulses){
    const rect = el.getBoundingClientRect();
    const radius = Math.max(86, Math.min(170, rect.width * 0.32));
    let any = false;
    el.querySelectorAll('.ch:not(.sp)').forEach(ch => {
      const chRect = ch.getBoundingClientRect();
      const cx = chRect.left + chRect.width / 2;
      const cy = chRect.top + chRect.height / 2;
      let alpha = 0, hueD = 0;
      for (const s of sources){
        const d = Math.hypot(cx - s.x, cy - s.y);
        const a = clamp01(1 - d / radius) * s.strength;
        if (a > alpha){ alpha = a; hueD = d; }
      }
      for (const p of pulses){
        const d = Math.hypot(cx - p.x, cy - p.y);
        const band = d - pulseRadius(p);
        const a = Math.exp(-band * band / 1500) * pulseFade(p);
        if (a > alpha){ alpha = a; hueD = d; }
      }
      if (alpha > 0.02){
        const hue = localHue(hueD);
        ch.style.setProperty('--lit-alpha', alpha.toFixed(3));
        ch.style.setProperty('--lit-hue', hue.toFixed(2));
        ch.style.color = 'hsl(' + hue.toFixed(2) + ', 58%, 72%)';
        ch.style.textShadow = '0 0 ' + (2 + alpha * 14).toFixed(2) + 'px hsla(' + hue.toFixed(2) + ', 66%, 70%, ' + (alpha * 0.48).toFixed(3) + ')';
        any = true;
      } else {
        ch.style.setProperty('--lit-alpha', '0');
        ch.style.color = '';
        ch.style.textShadow = '';
      }
    });
    el.classList.toggle('is-local-lit', any);
  }

  function animateBrandGlow(time, dt){
    const t = brandGlow.target;
    if (t){
      if (!brandGlow.current || brandGlow.current.el !== t.el){
        if (brandGlow.current && brandGlow.current.strength > 0.05) brandGlow.fading.push(brandGlow.current);
        else sound.shimmer(t.x);   // the glow catches from cold
        brandGlow.current = { el: t.el, x: t.x, y: t.y, strength: 0 };
      }
      const c = brandGlow.current;
      const k = 1 - Math.exp(-dt / 90);
      c.x += (t.x - c.x) * k;
      c.y += (t.y - c.y) * k;
      c.strength = Math.min(1, c.strength + dt / 170);
    } else if (brandGlow.current){
      brandGlow.current.strength -= dt / 640;
      if (brandGlow.current.strength <= 0.015) brandGlow.current = null;
    }
    for (let i = brandGlow.fading.length - 1; i >= 0; i--){
      brandGlow.fading[i].strength -= dt / 400;
      if (brandGlow.fading[i].strength <= 0.015) brandGlow.fading.splice(i, 1);
    }
    for (let i = brandGlow.pulses.length - 1; i >= 0; i--){
      brandGlow.pulses[i].age += dt;
      if (brandGlow.pulses[i].age >= brandGlow.pulses[i].life) brandGlow.pulses.splice(i, 1);
    }

    let active = false;
    [mark, title, studio].forEach(el => {
      const sources = glowSourcesFor(el, time);
      const pulses = brandGlow.pulses.filter(p => p.el === el);
      if (sources.length || pulses.length) active = true;
      if (sources.length || pulses.length || el.__hadGlow){
        if (el === mark) applyMarkGlow(sources, pulses);
        else applySplitGlow(el, sources, pulses);
        el.__hadGlow = sources.length > 0 || pulses.length > 0;
      }
    });
    if (active) markReflectionDirty();

    // steady drizzle of dust from wherever the brand is lit
    brandGlow.emitClock += dt;
    const emitter = (brandGlow.current && brandGlow.current.strength > 0.25) ? brandGlow.current : brandGlow.pinned;
    if (!reduced && emitter && brandGlow.emitClock > 95){
      brandGlow.emitClock = 0;
      spawnBrandMagic(emitter.el, emitter.x, emitter.y, 'hover');
    }
  }

  document.querySelectorAll('[data-lit]').forEach(el => {
    const follow = e => { brandGlow.target = { el, x: e.clientX, y: e.clientY }; };
    el.addEventListener('pointerenter', follow);
    el.addEventListener('pointermove', follow);
    el.addEventListener('pointerleave', () => {
      if (brandGlow.target && brandGlow.target.el === el) brandGlow.target = null;
    });
    el.addEventListener('click', e => {
      brandGlow.pulses.push({ el, x: e.clientX, y: e.clientY, age: 0, life: 1500 });
      spawnBrandMagic(el, e.clientX, e.clientY, 'click');
      sound.chime(e.clientX);
      if (brandGlow.pinned && brandGlow.pinned.el === el) brandGlow.pinned = null;
      else brandGlow.pinned = { el, x: e.clientX, y: e.clientY };
    });
  });

  /* Click intercept — let the color animation play before navigation */
  document.querySelectorAll('a[data-cta]').forEach(el => {
    el.addEventListener('click', e => {
      const href = el.getAttribute('href');
      if (!href || href === '#' || href.startsWith('mailto:') || href.startsWith('tel:')) return;
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      if (e.button !== 0) return;
      if (el.classList.contains('is-launching')) return;
      e.preventDefault();
      el.classList.add('is-launching', 'is-focus');
      const target = el.getAttribute('target');
      setTimeout(() => {
        if (target === '_blank'){
          window.open(href, '_blank', 'noopener,noreferrer');
          el.classList.remove('is-launching');
        } else {
          window.location.href = href;
        }
      }, 750);
    });
  });

  /* ───── Menu ───── */
  const menu = document.getElementById('menu');
  const menuToggle = document.querySelector('[data-menu-toggle]');
  menuToggle.addEventListener('click', e => {
    sound.tick(e.clientX);
    e.stopPropagation();
