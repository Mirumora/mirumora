<html lang="en">

<script>try{if(localStorage.getItem('mir-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>

<style>
:root{
  color-scheme: light dark;
  /* ── Light (cream) — the default ── */
  --ink:        #f3efe8;
  --bone:       #141413;
  --bone-dim:   #4f4b44;
  --muted:      #756f65;
  --line:       #cec7ba;
  --line-warm:  #a59d90;
  --vignette:   radial-gradient(120% 90% at 50% 28%, rgba(255,255,255,0.56) 0%, transparent 48%, rgba(70,61,48,0.12) 100%);
  --grain-opacity: 0.20;
  --cursor-line: rgba(20,20,19,0.90);
  --cta-line: rgba(20,20,19,0.78);
  --cta-fill: rgba(20,20,19,0.07);
  --logo-filter: none;
  --water-line: rgba(34, 92, 104, 0.28);
  --water-glow: rgba(55, 112, 122, 0.14);
}

:root[data-theme="dark"]{
  /* ── Dark (ink) ── */
  --ink:        #141413;
  --bone:       #f3efe8;
  --bone-dim:   #b6b0a3;
  --muted:      #7a766c;
  --line:       #2c2925;
  --line-warm:  #5a554c;
  --vignette:   radial-gradient(120% 90% at 50% 30%, transparent 0%, rgba(0,0,0,0.62) 100%);
  --grain-opacity: 0.38;
  --cursor-line: rgba(243,239,232,0.95);
  --cta-line: rgba(243,239,232,0.90);
  --cta-fill: rgba(243,239,232,0.10);
  --logo-filter: invert(1) brightness(1.05);
  --water-line: rgba(205, 229, 228, 0.25);
  --water-glow: rgba(173, 211, 214, 0.13);
}

*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden}
body{
  height: 100dvh;
  background: var(--ink);
  color: var(--bone);
  font: 15px/1.55 "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
}

/* stipple grain — fine CRT-static, near-uniform with a hint of bottom weight */
body::before{
  content:"";
  position: fixed; inset: 0;
  background-image: var(--grain, none);
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center;
  opacity: var(--grain-opacity);
  pointer-events: none;
  z-index: 2;
}
body::after{
  content:"";
  position: fixed; inset: 0;
  background: var(--vignette);
  pointer-events: none;
  z-index: 1;
}

/* cursor:none ONLY when JS confirms custom cursor is running */
body.has-custom-cursor,
body.has-custom-cursor *{ cursor: none !important; }

/* ── Custom cursor ───────────────────────── */
.cursor{
  position: fixed;
  left: 0; top: 0;
  width: 16px; height: 22px;
  border: 1px solid var(--cursor-line);
  border-radius: 2px;
  pointer-events: none;
  z-index: 9999;
  transform: translate3d(-100px, -100px, 0);
  transition: opacity .22s ease,
              width .22s cubic-bezier(.2,.8,.2,1),
              height .22s cubic-bezier(.2,.8,.2,1);
  mix-blend-mode: difference;
  will-change: transform;
}
.cursor.is-down{ width: 12px; height: 16px; }
.cursor.is-cta{ opacity: 0; }

/* ── CTA outline ────────────────────────── */
@property --sweep-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}
@property --lit-strength {
  syntax: '<number>';
  initial-value: 0;
  inherits: false;
}
[data-cta]{
  position: relative;
  display: inline-block;
}
[data-cta]::before{
  content:"";
  position: absolute;
  inset: -8px -14px;
  border: 1px solid transparent;
  border-radius: 4px;
  pointer-events: none;
  background-color: transparent;
  transition: border-color .25s ease,
              inset .35s cubic-bezier(.2,.8,.2,1),
              background-color .18s ease-out;
}
[data-cta]:hover::before,
[data-cta].is-focus::before{
  border-color: var(--cta-line);
  inset: -13px -22px;
}
/* click flash — brief inner fill on press */
[data-cta]:active::before{
  background-color: var(--cta-fill);
  transition: background-color .08s ease-out,
              border-color .25s ease,
              inset .35s cubic-bezier(.2,.8,.2,1);
}
/* traveling color sweep around the outline */
[data-cta]::after{
  content:"";
  position: absolute;
  inset: -8px -14px;
  border-radius: 4px;
  padding: 1.4px;
  background: conic-gradient(from var(--sweep-angle),
    transparent 0%,
    hsla(15, 70%, 75%, 0.95) 5%,
    hsla(45, 65%, 78%, 0.95) 10%,
    hsla(120, 50%, 75%, 0.95) 16%,
    hsla(190, 55%, 75%, 0.95) 22%,
    hsla(260, 50%, 78%, 0.95) 28%,
    hsla(320, 55%, 78%, 0.95) 34%,
    transparent 42%);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  mask-composite: exclude;
  opacity: 0;
  transition: opacity .35s ease,
              inset .35s cubic-bezier(.2,.8,.2,1);
  pointer-events: none;
}
[data-cta]:hover::after,
[data-cta].is-focus::after{
  opacity: 1;
  inset: -13px -22px;
  animation: cta-sweep 2.2s linear infinite;
}
[data-cta].is-launching::after{
  opacity: 1;
  inset: -13px -22px;
  animation: cta-sweep 0.55s linear infinite;
}
[data-cta].is-launching .ch{
  transition-duration: 0.18s !important;
  transition-delay: calc(var(--i, 0) * 14ms) !important;
}
@keyframes cta-sweep {
  to { --sweep-angle: 360deg; }
}

/* ── Per-letter color wash ────────────── */
.split .ch{
  display: inline-block;
  color: inherit;
  transition: color .18s ease, text-shadow .18s ease;
}
.split .ch.sp{ width: 0.28em; }
.split.is-local-lit .ch{
  transition-duration: .12s;
}

/* ── App layout ─────────────────────────── */
.app{
  position: relative;
  z-index: 3;
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* bottom-right light/dark toggle */
.theme-toggle{
  position: absolute;
  bottom: 22px;
  right: 32px;
  z-index: 6;
  background: transparent;
  border: 0;
  color: var(--bone-dim);
  font-family: "Hanken Grotesk", -apple-system, sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  padding: 6px 0;
  display: inline-flex;
  align-items: center;
  gap: 9px;
  transition: color .25s ease;
}
.theme-toggle:hover{ color: var(--bone); }
.theme-toggle .dot{
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 1px solid currentColor;
  background:
    linear-gradient(90deg, currentColor 0 50%, transparent 50% 100%);
  transition: transform .3s cubic-bezier(.2,.8,.2,1);
}
:root[data-theme="dark"] .theme-toggle .dot{ transform: rotate(180deg); }

/* top-right menu */
.menu{
  position: absolute;
  top: 26px;
  right: 32px;
  z-index: 6;
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
}
.menu-toggle{
  background: transparent;
  border: 0;
  color: var(--bone-dim);
  font: inherit;
  letter-spacing: inherit;
  text-transform: inherit;
  padding: 4px 0;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.menu-toggle .arrow{
  display: inline-block;
  transition: transform .25s ease;
}
.menu.is-open .menu-toggle{ color: var(--bone); }
.menu.is-open .menu-toggle .arrow{ transform: rotate(90deg); }
.menu-panel{
  position: absolute;
  top: 36px;
  right: 0;
  min-width: 200px;
  padding: 16px 4px 8px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  opacity: 0;
  transform: translateY(-6px);
  pointer-events: none;
  transition: opacity .25s ease, transform .25s ease;
}
.menu.is-open .menu-panel{
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.menu-panel a{
  color: var(--bone);
  text-decoration: none;
  font-family: "Playfair Display", Georgia, serif;
  font-size: 22px;
  font-style: italic;
  font-weight: 400;
  letter-spacing: 0;
  text-transform: none;
  padding: 4px 0;
}
.menu-panel .menu-sep{
  width: 80px;
  height: 1px;
  background: var(--line);
  margin: 10px 0 6px;
  align-self: flex-end;
}
.menu-panel .menu-meta{
  font-family: "Playfair Display", Georgia, serif;
  font-style: italic;
  font-size: 14px;
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--muted);
  padding: 2px 0;
}
.menu-panel a.menu-meta{
  color: var(--muted);
  text-decoration: none;
  text-transform: none;
}

/* ── Hero ────────────────────────────────── */
.hero{
  text-align: center;
  max-width: 760px;
  padding: 0 32px;
  margin-top: -18vh;
  z-index: 4;
  position: relative;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
}
/* logo mark — coloured via mask so it can go rainbow on hover/click */
.hero .mark{
  --lit-x: 50%;
  --lit-y: 50%;
  --lit-strength: 0;
  height: clamp(96px, 17vh, 168px);
  aspect-ratio: 467 / 1277;
  margin-bottom: clamp(22px, 3.2vh, 38px);
  background:
    radial-gradient(circle at var(--lit-x) var(--lit-y),
      hsla(15, 75%, 62%, calc(var(--lit-strength) * 0.95)) 0%,
      hsla(48, 78%, 62%, calc(var(--lit-strength) * 0.9)) 13%,
      hsla(128, 52%, 58%, calc(var(--lit-strength) * 0.82)) 25%,
      hsla(192, 64%, 60%, calc(var(--lit-strength) * 0.72)) 38%,
      hsla(262, 54%, 66%, calc(var(--lit-strength) * 0.55)) 52%,
      hsla(322, 64%, 66%, calc(var(--lit-strength) * 0.28)) 66%,
      transparent 78%),
    var(--bone);
  -webkit-mask: url('assets/Logo.svg') no-repeat center / contain;
  mask: url('assets/Logo.svg') no-repeat center / contain;
  pointer-events: auto;
  transition: --lit-strength .22s ease;
}

.hero h1{
  font-family: "Playfair Display", Georgia, serif;
  font-weight: 500;
  font-size: clamp(52px, 8vw, 96px);
  line-height: 1.0;
  letter-spacing: 0.005em;
  pointer-events: auto;
}
.hero .studio{
  margin-top: clamp(10px, 1.4vh, 16px);
  font-family: "Hanken Grotesk", -apple-system, sans-serif;
  font-weight: 300;
  font-size: clamp(13px, 1.2vw, 18px);
  letter-spacing: 0.42em;
  text-indent: 0.42em;
  color: var(--bone-dim);
  pointer-events: auto;
}

/* ── Quiet interactive water ─────────────── */
.water-plane{
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100%;
  height: 62vh;
  z-index: 3;
  pointer-events: none;
  opacity: 0.92;
  filter: saturate(0.92);
}
.magic-plane{
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 5;
  pointer-events: none;
  mix-blend-mode: screen;
}

/* bottom anchors */
.anchor{
  position: absolute;
  bottom: 24px;
  z-index: 5;
  font-size: 10px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--bone-dim);
  pointer-events: none;
}
.anchor-bl{ left: 32px; }

@media (max-width: 600px){
  .menu{ top: 22px; right: 22px; }
  .anchor{ bottom: 18px; font-size: 9px; }
  .anchor-bl{ left: 22px; letter-spacing: 0.24em; }
  .theme-toggle{ right: 22px; bottom: 16px; font-size: 9px; letter-spacing: 0.24em; }
  .hero{ padding: 0 22px; margin-top: -12vh; }
  .menu-panel{ min-width: 170px; }
  .menu-panel a, .menu-panel .soon{ font-size: 20px; }
  .water-plane{ height: 56vh; }
}

@media (prefers-reduced-motion: reduce){
  .cursor{ display: none; }
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="app">

  <nav class="menu" id="menu">
    <button class="menu-toggle" data-cta data-menu-toggle aria-expanded="false">
      Menu <span class="arrow">›</span>
    </button>
    <div class="menu-panel" role="menu">
      <a href="products/" data-cta data-split>Products</a>
      <a href="agents/" data-cta data-split>For Agents</a>
      <a href="about/" data-cta data-split>About</a>
      <div class="menu-sep"></div>
      <span class="menu-meta">@mirumora</span>
      <a href="mailto:hello@mirumora.com" data-cta class="menu-meta">hello@mirumora.com</a>
    </div>
  </nav>

  <canvas class="water-plane" id="waterSim" aria-hidden="true"></canvas>
  <canvas class="water-plane" id="waterPlane" aria-hidden="true"></canvas>
  <canvas class="magic-plane" id="magicPlane" aria-hidden="true"></canvas>

  <main class="hero">
    <div class="mark" data-lit role="img" aria-label="Mirumora Studio mark"></div>
    <h1 data-split data-lit>Mirumora</h1>
    <p class="studio" data-split data-lit>STUDIO</p>
  </main>

  <div class="anchor anchor-bl">Mirumora</div>

  <button class="theme-toggle" id="themeToggle" data-cta aria-label="Toggle light or dark mode">
    <span class="dot" aria-hidden="true"></span><span class="tlabel">Light</span>
  </button>

</div>

<script>
(function(){
  const root = document.documentElement;
  const THEME_KEY = 'mir-theme';
  function isLight(){ return root.getAttribute('data-theme') !== 'dark'; }

  /* ───── Stipple grain — fine CRT static, dense but soft ───── */
  function ensureGrain(){
    const light = isLight();
    const KEY = light ? 'mir-grain-v1-light' : 'mir-grain-v1-dark';
    let url = null;
    try { url = localStorage.getItem(KEY); } catch(e){}
    if (!url){
      const W = 1200, H = 900;
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      const ctx = c.getContext('2d');
      for (let y = 0; y < H; y++){
        const yn = y / H;
        // dense uniform static (~5%) with subtle bottom weight (+2%)
        const density = 0.055 + Math.pow(yn, 2.2) * 0.022;
        for (let x = 0; x < W; x++){
          if (Math.random() < density){
            const a = 0.18 + Math.random() * 0.22;   // soft per-particle alpha
            const grain = light ? '20, 20, 19' : '243, 239, 232';
            ctx.fillStyle = `rgba(${grain}, ${a.toFixed(3)})`;
            ctx.fillRect(x, y, 1, 1);
          }
        }
      }
      url = c.toDataURL('image/png');
      try { localStorage.setItem(KEY, url); } catch(e){}
    }
    document.body.style.setProperty('--grain', `url("${url}")`);
  }
  /* ───── Theme: manual light/dark, defaults to light ───── */
  function applyTheme(t){
    root.setAttribute('data-theme', t);
    try { localStorage.setItem(THEME_KEY, t); } catch(e){}
    const label = document.querySelector('#themeToggle .tlabel');
    if (label) label.textContent = t === 'dark' ? 'Dark' : 'Light';
    ensureGrain();
  }
  let storedTheme = null;
  try { storedTheme = localStorage.getItem(THEME_KEY); } catch(e){}
  applyTheme(storedTheme === 'dark' ? 'dark' : 'light');
  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle){
    themeToggle.addEventListener('click', () => applyTheme(isLight() ? 'dark' : 'light'));
  }

  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  // Robust detection: only show custom cursor on devices with a primary mouse-like pointer
  const finePointer = matchMedia('(hover: hover) and (pointer: fine)').matches;
  const canCustomCursor =
    finePointer && !reduced;

  /* ───── Cursor ───── */
  const cursor = document.getElementById('cursor');
  let cx = innerWidth / 2, cy = innerHeight / 2;
  let tx = cx, ty = cy;
  let cursorX = cx, cursorY = cy;
  let mouseMoved = false;

  function onMouseMove(e){
    tx = e.clientX; ty = e.clientY;
    cursorX = e.clientX; cursorY = e.clientY;
    mouseMoved = true;
  }

  if (canCustomCursor){
    try {
      document.body.classList.add('has-custom-cursor');
      addEventListener('mousemove', onMouseMove, { passive: true });
      addEventListener('mousedown', () => cursor.classList.add('is-down'));
      addEventListener('mouseup', () => cursor.classList.remove('is-down'));
      (function tick(){
        cx += (tx - cx) * 0.30;
        cy += (ty - cy) * 0.30;
        cursor.style.transform =
          `translate3d(${cx}px, ${cy}px, 0) translate(-50%, -50%)`;
        requestAnimationFrame(tick);
      })();
    } catch (err){
      document.body.classList.remove('has-custom-cursor');
      cursor.style.display = 'none';
    }
  } else {
    cursor.style.display = 'none';
    // still track for gather mode (touch devices use touchmove handler below)
    addEventListener('mousemove', onMouseMove, { passive: true });
  }

  /* CTA hover */
  document.querySelectorAll('[data-cta]').forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursor.classList.add('is-cta');
      el.classList.add('is-focus');
    });
    el.addEventListener('mouseleave', () => {
      cursor.classList.remove('is-cta');
      el.classList.remove('is-focus');
    });
  });

  /* Per-letter splitter — preserves nested tags (e.g. <em>) */
  function splitElement(el){
    if (el.classList.contains('split')) return;
    let i = 0;
    function walk(node){
      if (node.nodeType === 3){
        const text = node.textContent;
        const frag = document.createDocumentFragment();
        for (const ch of text){
          const span = document.createElement('span');
          if (ch === ' '){
            span.className = 'ch sp';
          } else {
            span.className = 'ch';
            span.textContent = ch;
          }
          span.style.setProperty('--i', i++);
          frag.appendChild(span);
        }
        node.parentNode.replaceChild(frag, node);
      } else if (node.nodeType === 1 && node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE'){
        [...node.childNodes].forEach(walk);
      }
    }
    walk(el);
    el.classList.add('split');
  }
  document.querySelectorAll('[data-split]').forEach(splitElement);

  /* Local rainbow source — hover follows the cursor; click pins that point. */
  const brandGlow = {
    active: null,
    pinned: null,
    signature: ''
  };

  function markReflectionDirty(){
    if (simWater) simWater.markDirty();
  }

  function clamp01(n){
    return Math.max(0, Math.min(1, n));
  }

  function localHue(distance){
    return (15 + distance * 1.85) % 360;
  }

  function setMarkGlow(el, x, y, strength){
    const rect = el.getBoundingClientRect();
    const px = clamp01((x - rect.left) / Math.max(1, rect.width)) * 100;
    const py = clamp01((y - rect.top) / Math.max(1, rect.height)) * 100;
    el.style.setProperty('--lit-x', px.toFixed(2) + '%');
    el.style.setProperty('--lit-y', py.toFixed(2) + '%');
    el.style.setProperty('--lit-strength', strength.toFixed(3));
  }

  function setSplitGlow(el, x, y, strength){
    const rect = el.getBoundingClientRect();
    const radius = Math.max(86, Math.min(170, rect.width * 0.32));
    let any = false;
    el.querySelectorAll('.ch:not(.sp)').forEach(ch => {
      const chRect = ch.getBoundingClientRect();
      const dx = chRect.left + chRect.width / 2 - x;
      const dy = chRect.top + chRect.height / 2 - y;
      const d = Math.hypot(dx, dy);
      const alpha = clamp01(1 - d / radius) * strength;
      const hue = localHue(d);
      ch.style.setProperty('--lit-alpha', alpha.toFixed(3));
      ch.style.setProperty('--lit-hue', hue.toFixed(2));
      if (alpha > 0.02){
        ch.style.color = 'hsl(' + hue.toFixed(2) + ', 58%, 72%)';
        ch.style.textShadow = '0 0 ' + (2 + alpha * 14).toFixed(2) + 'px hsla(' + hue.toFixed(2) + ', 66%, 70%, ' + (alpha * 0.48).toFixed(3) + ')';
        any = true;
      } else {
        ch.style.color = '';
        ch.style.textShadow = '';
      }
    });
    el.classList.toggle('is-local-lit', any);
  }

  function clearLocalGlow(el){
    if (el.classList.contains('mark')){
      el.style.setProperty('--lit-strength', '0');
    } else {
      el.querySelectorAll('.ch').forEach(ch => {
        ch.style.setProperty('--lit-alpha', '0');
        ch.style.color = '';
        ch.style.textShadow = '';
      });
      el.classList.remove('is-local-lit');
    }
  }

  function setBrandGlow(el, x, y, strength = 1, pinned = false){
    if (el.classList.contains('mark')) setMarkGlow(el, x, y, strength);
    else setSplitGlow(el, x, y, strength);
    brandGlow.active = { el, x, y, strength, pinned };
    brandGlow.signature = el.className + ':' + Math.round(x) + ':' + Math.round(y) + ':' + strength.toFixed(2) + ':' + (pinned ? '1' : '0');
    markReflectionDirty();
  }

  function clearBrandGlow(el){
    if (brandGlow.pinned && brandGlow.pinned.el === el) return;
    clearLocalGlow(el);
    if (brandGlow.active && brandGlow.active.el === el){
      brandGlow.active = brandGlow.pinned;
      if (brandGlow.pinned) setBrandGlow(brandGlow.pinned.el, brandGlow.pinned.x, brandGlow.pinned.y, 1, true);
      else markReflectionDirty();
    }
  }

  document.querySelectorAll('[data-lit]').forEach(el => {
    el.addEventListener('pointerenter', e => {
      if (brandGlow.pinned) return;
      setBrandGlow(el, e.clientX, e.clientY);
    });
    el.addEventListener('pointermove', e => {
      if (brandGlow.pinned) return;
      setBrandGlow(el, e.clientX, e.clientY);
    });
    el.addEventListener('pointerleave', () => {
      if (!brandGlow.pinned) clearBrandGlow(el);
    });
    el.addEventListener('click', e => {
      spawnBrandMagic(el, e.clientX, e.clientY);
      if (brandGlow.pinned && brandGlow.pinned.el === el){
        brandGlow.pinned = null;
        clearLocalGlow(el);
        brandGlow.active = null;
        markReflectionDirty();
        return;
      }
      if (brandGlow.pinned && brandGlow.pinned.el !== el) clearLocalGlow(brandGlow.pinned.el);
      brandGlow.pinned = { el, x: e.clientX, y: e.clientY, strength: 1, pinned: true };
      setBrandGlow(el, e.clientX, e.clientY, 1, true);
    });
  });

  /* Click intercept — let the color animation play before navigation */
  document.querySelectorAll('a[data-cta]').forEach(el => {
    el.addEventListener('click', e => {
      const href = el.getAttribute('href');
      if (!href || href === '#' || href.startsWith('mailto:') || href.startsWith('tel:')) return;
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      if (e.button !== 0) return;
      if (el.classList.contains('is-launching')) return;
      e.preventDefault();
      el.classList.add('is-launching', 'is-focus');
      const target = el.getAttribute('target');
      setTimeout(() => {
        if (target === '_blank'){
          window.open(href, '_blank', 'noopener,noreferrer');
          el.classList.remove('is-launching');
        } else {
          window.location.href = href;
        }
      }, 750);
    });
  });

  /* ───── Menu ───── */
  const menu = document.getElementById('menu');
  const menuToggle = document.querySelector('[data-menu-toggle]');
  menuToggle.addEventListener('click', e => {
    e.stopPropagation();
    const open = menu.classList.toggle('is-open');
    menuToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  document.addEventListener('click', e => {
    if (!menu.contains(e.target)){
      menu.classList.remove('is-open');
      menuToggle.setAttribute('aria-expanded', 'false');
    }
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape'){
      menu.classList.remove('is-open');
      menuToggle.setAttribute('aria-expanded', 'false');
    }
  });

  // Reflective water
  const water = document.getElementById('waterPlane');
  const waterCtx = water.getContext('2d', { alpha: true });
  const hero = document.querySelector('.hero');
  const mark = document.querySelector('.hero .mark');
  const title = document.querySelector('.hero h1');
  const studio = document.querySelector('.hero .studio');
  const magic = document.getElementById('magicPlane');
  const magicCtx = magic.getContext('2d', { alpha: true });
  const logoImg = new Image();
  logoImg.src = 'assets/Logo.svg';

  let waterWidth = 0;
  let waterHeight = 0;
  let waterDpr = 1;
  let magicDpr = 1;
  let surfaceY = 0;
  let pointerX = innerWidth / 2;
  let pointerY = innerHeight / 2;
  let lastPointerX = pointerX;
  let lastPointerY = pointerY;
  let lastWaterTime = performance.now();
  let pointerInsideWater = false;
  const ripples = [];
  const drops = [];
  const magicDust = [];
  const magicBursts = [];
  let simWater = null;   // WebGL2 ripple physics — null means the legacy 2D path runs
  let simEnergy = 0;     // recent-disturbance energy, drives the surface glow pulse

  const reflectionCanvas = document.createElement('canvas');
  const reflectionCtx = reflectionCanvas.getContext('2d');
  const sliceCanvas = document.createElement('canvas');
  const sliceCtx = sliceCanvas.getContext('2d');
  const logoScratch = document.createElement('canvas');
  const logoScratchCtx = logoScratch.getContext('2d');

  function resizeWater(){
    const rect = water.getBoundingClientRect();
    waterDpr = Math.min(devicePixelRatio || 1, 2);
    waterWidth = Math.max(1, rect.width);
    waterHeight = Math.max(1, rect.height);
    water.width = Math.round(waterWidth * waterDpr);
    water.height = Math.round(waterHeight * waterDpr);
    waterCtx.setTransform(waterDpr, 0, 0, waterDpr, 0, 0);
    magicDpr = Math.min(devicePixelRatio || 1, 2);
    magic.width = Math.round(innerWidth * magicDpr);
    magic.height = Math.round(innerHeight * magicDpr);
    magicCtx.setTransform(magicDpr, 0, 0, magicDpr, 0, 0);
    reflectionCanvas.width = Math.round(waterWidth * waterDpr);
    reflectionCanvas.height = Math.round(waterHeight * waterDpr);
    reflectionCtx.setTransform(waterDpr, 0, 0, waterDpr, 0, 0);
    sliceCanvas.width = Math.round(waterWidth * waterDpr);
    sliceCanvas.height = Math.round(waterHeight * waterDpr);
    sliceCtx.setTransform(waterDpr, 0, 0, waterDpr, 0, 0);
    surfaceY = Math.max(52, Math.min(waterHeight * 0.44, waterHeight - 240));
    if (simWater) simWater.resize();
  }

  function brandGlowState(){
    return brandGlow.pinned || brandGlow.active;
  }

  function brandGlowSignature(){
    const glow = brandGlowState();
    if (!glow) return 'none';
    return (glow.el === mark ? 'mark' : glow.el === title ? 'title' : 'studio') +
      ':' + Math.round(glow.x) + ':' + Math.round(glow.y) + ':' + glow.strength.toFixed(2);
  }

  function colorForCssVar(name){
    return getComputedStyle(root).getPropertyValue(name).trim();
  }

  function fillLogo(ctx, x, y, w, h, glow){
    if (!(logoImg.complete && logoImg.naturalWidth) || w <= 0 || h <= 0) return;
    // Recolor the logo opaquely on its own scratch canvas first, then composite
    // it once into ctx — otherwise the source-in fill and the caller's reflection
    // alpha multiply together and the result is effectively invisible.
    const sw = Math.max(1, Math.ceil(w));
    const sh = Math.max(1, Math.ceil(h));
    if (logoScratch.width !== sw) logoScratch.width = sw;
    if (logoScratch.height !== sh) logoScratch.height = sh;
    logoScratchCtx.clearRect(0, 0, sw, sh);
    logoScratchCtx.drawImage(logoImg, 0, 0, sw, sh);
    logoScratchCtx.globalCompositeOperation = 'source-in';
    logoScratchCtx.fillStyle = colorForCssVar('--bone');
    logoScratchCtx.fillRect(0, 0, sw, sh);
    if (glow && glow.el === mark){
      logoScratchCtx.globalCompositeOperation = 'source-atop';
      const markRect = mark.getBoundingClientRect();
      const gx = clamp01((glow.x - markRect.left) / Math.max(1, markRect.width)) * sw;
      const gy = clamp01((glow.y - markRect.top) / Math.max(1, markRect.height)) * sh;
      const r = Math.max(sw, sh) * 0.44;
      const grad = logoScratchCtx.createRadialGradient(gx, gy, 0, gx, gy, r);
      grad.addColorStop(0.00, 'hsla(15, 75%, 62%, 0.96)');
      grad.addColorStop(0.16, 'hsla(48, 78%, 62%, 0.92)');
      grad.addColorStop(0.30, 'hsla(128, 52%, 58%, 0.84)');
      grad.addColorStop(0.46, 'hsla(192, 64%, 60%, 0.72)');
      grad.addColorStop(0.62, 'hsla(262, 54%, 66%, 0.54)');
      grad.addColorStop(0.78, 'hsla(322, 64%, 66%, 0.28)');
      grad.addColorStop(1.00, 'hsla(322, 64%, 66%, 0)');
      logoScratchCtx.fillStyle = grad;
      logoScratchCtx.fillRect(0, 0, sw, sh);
    }
    logoScratchCtx.globalCompositeOperation = 'source-over';
    ctx.drawImage(logoScratch, x, y, w, h);
  }

  function drawReflectedSplit(ctx, el, waterRect, baseColor, baseAlpha, glow){
    const style = getComputedStyle(el);
    const elRect = el.getBoundingClientRect();
    const radius = Math.max(86, Math.min(170, elRect.width * 0.32));
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.font = style.fontWeight + ' ' + style.fontSize + ' ' + style.fontFamily;
    el.querySelectorAll('.ch:not(.sp)').forEach(ch => {
      const chRect = ch.getBoundingClientRect();
      const x = chRect.left - waterRect.left;
      const y = chRect.top - waterRect.top;
      ctx.globalAlpha = baseAlpha;
      ctx.fillStyle = baseColor;
      ctx.fillText(ch.textContent, x, y);
      if (glow && glow.el === el){
        const dx = chRect.left + chRect.width / 2 - glow.x;
        const dy = chRect.top + chRect.height / 2 - glow.y;
        const d = Math.hypot(dx, dy);
        const alpha = clamp01(1 - d / radius) * glow.strength;
        if (alpha > 0.02){
          ctx.globalAlpha = baseAlpha * (1 + alpha * 1.8);
          ctx.fillStyle = 'hsl(' + localHue(d).toFixed(2) + ', 60%, 70%)';
          ctx.shadowColor = 'hsla(' + localHue(d).toFixed(2) + ', 68%, 70%, ' + (alpha * 0.34).toFixed(3) + ')';
          ctx.shadowBlur = 6 + alpha * 10;
          ctx.fillText(ch.textContent, x, y);
          ctx.shadowBlur = 0;
        }
      }
    });
    ctx.globalAlpha = 1;
  }

  function drawReflectionSource(){
    reflectionCtx.clearRect(0, 0, waterWidth, waterHeight);
    const waterRect = water.getBoundingClientRect();
    const markRect = mark.getBoundingClientRect();
    const titleRect = title.getBoundingClientRect();
    const studioRect = studio.getBoundingClientRect();
    const glow = brandGlowState();

    // Mirror the brand about the waterline (surfaceY) and foreshorten it, the way
    // a real reflection compresses with distance. This keeps every reflection
    // sitting directly under its element and pulls the tall logo up into view
    // instead of stranding it in the faded depths.
    const compress = 0.66;
    reflectionCtx.save();
    reflectionCtx.translate(0, surfaceY);
    reflectionCtx.scale(1, -compress);
    reflectionCtx.translate(0, -surfaceY);
    // The logo sits highest, so its reflection lands deepest in the fade — give
    // it a heavier alpha so it survives and reads under the mark.
    reflectionCtx.globalAlpha = isLight() ? 0.30 : 0.36;

    fillLogo(
      reflectionCtx,
      markRect.left - waterRect.left,
      markRect.top - waterRect.top,
      markRect.width,
      markRect.height,
      glow
    );

    drawReflectedSplit(reflectionCtx, title, waterRect, colorForCssVar('--bone'), isLight() ? 0.16 : 0.20, glow);
    drawReflectedSplit(reflectionCtx, studio, waterRect, colorForCssVar('--bone-dim'), isLight() ? 0.13 : 0.16, glow);
    reflectionCtx.restore();

    reflectionCtx.save();
    const fade = reflectionCtx.createLinearGradient(0, surfaceY, 0, waterHeight);
    fade.addColorStop(0, 'rgba(0,0,0,0.42)');
    fade.addColorStop(0.10, 'rgba(0,0,0,0.82)');
    fade.addColorStop(0.5, 'rgba(0,0,0,0.42)');
    fade.addColorStop(1, 'rgba(0,0,0,0)');
    reflectionCtx.globalCompositeOperation = 'destination-in';
    reflectionCtx.fillStyle = fade;
    reflectionCtx.fillRect(0, 0, waterWidth, waterHeight);
    reflectionCtx.restore();
  }

  function addRipple(x, y, strength = 1){
    const waterRect = water.getBoundingClientRect();
    ripples.push({
      x: x - waterRect.left,
      y: y - waterRect.top,
      radius: 2,
      strength,
      life: 1
    });
    if (ripples.length > 36) ripples.shift();
  }

  function spawnDrops(x, y, force){
    const waterRect = water.getBoundingClientRect();
    const localY = y - waterRect.top;
    for (let i = 0; i < Math.min(5, Math.ceil(force * 2)); i++){
      drops.push({
        x: x - waterRect.left + (Math.random() - 0.5) * 16,
        y: localY + (Math.random() - 0.5) * 6,
        vx: (Math.random() - 0.5) * 0.06,
        vy: -0.08 - Math.random() * 0.08,
        life: 0.75
      });
    }
    if (drops.length > 50) drops.splice(0, drops.length - 50);
  }

  function disturbFromPointer(x, y, force){
    const waterRect = water.getBoundingClientRect();
    const localY = y - waterRect.top;
    if (localY < surfaceY - 18 || localY > waterHeight + 12) return;
    if (simWater){
      simWater.disturb(x - waterRect.left, localY, force);
      if (force >= 1) spawnDrops(x, y, force);
      return;
    }
    addRipple(x, y, force);
    spawnDrops(x, y, force);
  }

  function waveOffset(x, y, time){
    let offset = 0;
    for (const ripple of ripples){
      const dx = x - ripple.x;
      const dy = (y - ripple.y) * 2.8;
      const dist = Math.hypot(dx, dy);
      const crest = ripple.radius;
      const falloff = Math.max(0, 1 - Math.abs(dist - crest) / 54);
      offset += Math.sin((dist - crest) * 0.18) * falloff * ripple.life * ripple.strength * 7;
    }
    if (pointerInsideWater){
      const waterRect = water.getBoundingClientRect();
      const dx = x - (pointerX - waterRect.left);
      const dy = (y - (pointerY - waterRect.top)) * 2.5;
      const dist = Math.hypot(dx, dy);
      const falloff = Math.max(0, 1 - dist / 92);
      offset += Math.sin(dist * 0.22 - time * 0.012) * falloff * 1.6;
    }
    return offset;
  }

  function drawDistortedReflection(time){
    sliceCtx.clearRect(0, 0, waterWidth, waterHeight);
    const row = 3;
    for (let y = 0; y < waterHeight; y += row){
      const depth = Math.max(0, (y - surfaceY) / Math.max(1, waterHeight - surfaceY));
      let energy = 0;
      for (const ripple of ripples){
        const dy = Math.abs(y - ripple.y);
        energy += Math.max(0, 1 - dy / 180) * ripple.life * ripple.strength;
      }
      const idle = (
        Math.sin(y * 0.045 + time * 0.00070) * 0.6 +
        Math.sin(y * 0.110 + time * 0.00130) * 0.3 +
        Math.sin(y * 0.021 - time * 0.00050) * 0.5
      ) * depth;
      const pointerWave = waveOffset(waterWidth * 0.5, y, time) * 0.14;
      const shift = idle + pointerWave + Math.sin(y * 0.13 + time * 0.0011) * energy * 1.4;
      // Source rect is in the reflection canvas's backing-store pixels (which are
      // scaled by waterDpr); the destination is in CSS pixels via sliceCtx's
      // transform. Mixing the two is what pushed the reflection low and to the
      // right on Retina (dpr 2) displays.
      sliceCtx.drawImage(
        reflectionCanvas,
        0, y * waterDpr, waterWidth * waterDpr, row * waterDpr,
        shift, y, waterWidth, row
      );
    }
    waterCtx.drawImage(sliceCanvas, 0, 0, waterWidth, waterHeight);
  }

  function drawWater(time){
    const dt = Math.min(34, time - lastWaterTime);
    lastWaterTime = time;
    waterCtx.clearRect(0, 0, waterWidth, waterHeight);
    if (!waterWidth || !waterHeight) return;

    drawReflectionSource();
    drawDistortedReflection(time);

    const light = isLight();
    const line = light ? '34, 92, 104' : '205, 229, 228';
    const glow = light ? '55, 112, 122' : '173, 211, 214';
    const surfacePulse = ripples.reduce((sum, ripple) => sum + ripple.life * ripple.strength, 0);

    const surfaceGrad = waterCtx.createLinearGradient(0, surfaceY - 36, 0, waterHeight);
    surfaceGrad.addColorStop(0, 'rgba(' + glow + ', ' + (0.018 + Math.min(0.05, surfacePulse * 0.01)) + ')');
    surfaceGrad.addColorStop(0.22, 'rgba(' + glow + ', ' + (light ? 0.035 : 0.045) + ')');
    surfaceGrad.addColorStop(1, 'rgba(' + glow + ', 0)');
    waterCtx.fillStyle = surfaceGrad;
    waterCtx.fillRect(0, Math.max(0, surfaceY - 44), waterWidth, waterHeight);

    waterCtx.save();
    waterCtx.beginPath();
    for (let x = 0; x <= waterWidth; x += 12){
      const y = surfaceY
        + Math.sin(x * 0.013 + time * 0.0009) * 1.2
        + Math.sin(x * 0.031 - time * 0.0013) * 0.6
        + waveOffset(x, surfaceY, time) * 0.26;
      if (x === 0) waterCtx.moveTo(x, y);
      else waterCtx.lineTo(x, y);
    }
    waterCtx.strokeStyle = 'rgba(' + line + ', ' + (0.055 + Math.min(0.16, surfacePulse * 0.018)) + ')';
    waterCtx.lineWidth = 0.8;
    waterCtx.stroke();
    waterCtx.restore();

    for (let i = ripples.length - 1; i >= 0; i--){
      const ripple = ripples[i];
      ripple.radius += dt * (0.055 + ripple.strength * 0.016);
      ripple.life -= dt * 0.00072;
      const alpha = Math.max(0, ripple.life) * (light ? 0.13 : 0.18) * ripple.strength;
      waterCtx.beginPath();
      waterCtx.ellipse(ripple.x, ripple.y, ripple.radius, ripple.radius * 0.22, 0, 0, Math.PI * 2);
      waterCtx.strokeStyle = 'rgba(' + line + ', ' + alpha + ')';
      waterCtx.lineWidth = 0.7;
      waterCtx.stroke();
      waterCtx.beginPath();
      waterCtx.ellipse(ripple.x, ripple.y, ripple.radius * 0.56, ripple.radius * 0.13, 0, 0, Math.PI * 2);
      waterCtx.strokeStyle = 'rgba(' + line + ', ' + (alpha * 0.52) + ')';
      waterCtx.stroke();
      if (ripple.life <= 0) ripples.splice(i, 1);
    }

    drawDrops(dt, line);

    requestAnimationFrame(drawWater);
  }

  function drawDrops(dt, line){
    for (let i = drops.length - 1; i >= 0; i--){
      const drop = drops[i];
      drop.x += drop.vx * dt;
      drop.y += drop.vy * dt;
      drop.vy += 0.0009 * dt;
      drop.life -= dt * 0.0011;
      waterCtx.beginPath();
      waterCtx.arc(drop.x, drop.y, 0.8, 0, Math.PI * 2);
      waterCtx.fillStyle = 'rgba(' + line + ', ' + (Math.max(0, drop.life) * 0.16) + ')';
      waterCtx.fill();
      if (drop.life <= 0) drops.splice(i, 1);
    }
  }

  // ── Real ripple physics (WebGL2 height field) ─────────────
  // Every touch presses the surface down at that spot; the wave equation then
  // propagates it outward, ripples interfere and bounce off the edges, and the
  // reflection is refracted per-pixel by the local surface slope — instead of
  // the old whole-row wobble. The sim runs in "plane space": screen y is
  // remapped so ripples foreshorten toward the waterline like a receding pond.
  const SIM_GAMMA = 1.8;

  function initSimWater(){
    const canvas = document.getElementById('waterSim');
    const gl = canvas.getContext('webgl2', { alpha: true, antialias: false, premultipliedAlpha: true });
    if (!gl) return null;
    if (!gl.getExtension('EXT_color_buffer_float') && !gl.getExtension('EXT_color_buffer_half_float')) return null;

    const VS_SRC = '#version 300 es\n' +
      'layout(location=0) in vec2 aPos;\n' +
      'out vec2 vUv;\n' +
      'void main(){ vUv = aPos * 0.5 + 0.5; gl_Position = vec4(aPos, 0.0, 1.0); }';

    const STEP_FS = '#version 300 es\n' + `
      precision highp float;
      uniform sampler2D uPrev;
      uniform vec2 uTexel;
      uniform vec2 uSimSize;
      uniform int uDropCount;
      uniform vec4 uDrops[10];
      in vec2 vUv;
      out vec4 outColor;
      void main(){
        vec2 c = texture(uPrev, vUv).rg;
        float hl = texture(uPrev, vUv - vec2(uTexel.x, 0.0)).r;
        float hr = texture(uPrev, vUv + vec2(uTexel.x, 0.0)).r;
        float hu = texture(uPrev, vUv - vec2(0.0, uTexel.y)).r;
        float hd = texture(uPrev, vUv + vec2(0.0, uTexel.y)).r;
        float avg = (hl + hr + hu + hd) * 0.25;
        float vel = (c.g + (avg - c.r) * 0.45) * 0.994;
        float h = (c.r + vel) * 0.9995;
        for (int i = 0; i < 10; i++){
          if (i >= uDropCount) break;
          vec4 d = uDrops[i];
          vec2 p = (vUv - d.xy) * uSimSize;
          h -= d.w * exp(-dot(p, p) / (d.z * d.z));
        }
        outColor = vec4(clamp(h, -3.0, 3.0), vel, 0.0, 1.0);
      }`;

    const DRAW_FS = '#version 300 es\n' + `
      precision highp float;
      uniform sampler2D uHeight;
      uniform sampler2D uRefl;
      uniform vec2 uSize;
      uniform float uSurfaceY;
      uniform float uTime;
      uniform vec3 uLineCol;
      in vec2 vUv;
      out vec4 outColor;
      const float GAMMA = ${SIM_GAMMA.toFixed(2)};
      void main(){
        float yCss = (1.0 - vUv.y) * uSize.y;
        float span = max(1.0, uSize.y - uSurfaceY);
        float vs = (yCss - uSurfaceY) / span;
        if (vs < -0.03){ outColor = vec4(0.0); return; }
        float vsc = clamp(vs, 0.0, 1.0);
        float inWater = smoothstep(0.0, 0.012, vs);
        vec2 suv = vec2(vUv.x, pow(max(vsc, 0.0001), 1.0 / GAMMA));
        vec2 ts = vec2(textureSize(uHeight, 0));
        vec2 e = 1.5 / ts;
        float dhx = texture(uHeight, suv + vec2(e.x, 0.0)).r - texture(uHeight, suv - vec2(e.x, 0.0)).r;
        float dhy = texture(uHeight, suv + vec2(0.0, e.y)).r - texture(uHeight, suv - vec2(0.0, e.y)).r;

        float idle = (sin(yCss * 0.045 + uTime * 0.0007) * 0.6
                    + sin(yCss * 0.110 + uTime * 0.0013) * 0.3
                    + sin(yCss * 0.021 - uTime * 0.0005) * 0.5) * vsc;

        float near = mix(0.40, 1.0, vsc);
        vec2 off = vec2(dhx * 120.0 * near + idle, dhy * 210.0 * near) / uSize;
        vec4 refl = texture(uRefl, clamp(vUv + off, 0.0, 1.0));

        float glint = pow(clamp(dhy * 10.0, 0.0, 1.0), 1.4) * 0.42 * mix(0.45, 1.0, vsc) * inWater;
        float shade = pow(clamp(-dhy * 10.0, 0.0, 1.0), 1.4) * 0.30 * inWater;

        float hline = texture(uHeight, vec2(vUv.x, 1.5 / ts.y)).r;
        float dlx = texture(uHeight, vec2(vUv.x + e.x, 1.5 / ts.y)).r
                  - texture(uHeight, vec2(vUv.x - e.x, 1.5 / ts.y)).r;
        float lineY = uSurfaceY
                    + sin(vUv.x * uSize.x * 0.013 + uTime * 0.0009) * 1.2
                    + sin(vUv.x * uSize.x * 0.031 - uTime * 0.0013) * 0.6
                    + hline * 22.0;
        float dl = yCss - lineY;
        float lineA = exp(-dl * dl / 1.8) * (0.085 + clamp(abs(dlx) * 5.0, 0.0, 0.22));

        vec3 col = refl.rgb * (1.0 - shade) + uLineCol * (glint + lineA);
        float a = clamp(refl.a * (1.0 - shade * 0.5) + glint + lineA, 0.0, 1.0);
        outColor = vec4(col, a);
      }`;

    function shader(type, src){
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
        console.warn('water shader: ' + gl.getShaderInfoLog(s));
        return null;
      }
      return s;
    }
    function program(fsSrc){
      const vs = shader(gl.VERTEX_SHADER, VS_SRC);
      const fs = shader(gl.FRAGMENT_SHADER, fsSrc);
      if (!vs || !fs) return null;
      const p = gl.createProgram();
      gl.attachShader(p, vs);
      gl.attachShader(p, fs);
      gl.linkProgram(p);
      return gl.getProgramParameter(p, gl.LINK_STATUS) ? p : null;
    }

    const stepProg = program(STEP_FS);
    const drawProg = program(DRAW_FS);
    if (!stepProg || !drawProg) return null;

    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

    const su = {
      prev: gl.getUniformLocation(stepProg, 'uPrev'),
      texel: gl.getUniformLocation(stepProg, 'uTexel'),
      simSize: gl.getUniformLocation(stepProg, 'uSimSize'),
      dropCount: gl.getUniformLocation(stepProg, 'uDropCount'),
      drops: gl.getUniformLocation(stepProg, 'uDrops[0]')
    };
    const du = {
      height: gl.getUniformLocation(drawProg, 'uHeight'),
      refl: gl.getUniformLocation(drawProg, 'uRefl'),
      size: gl.getUniformLocation(drawProg, 'uSize'),
      surfaceY: gl.getUniformLocation(drawProg, 'uSurfaceY'),
      time: gl.getUniformLocation(drawProg, 'uTime'),
      lineCol: gl.getUniformLocation(drawProg, 'uLineCol')
    };

    function texParams(){
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    }

    const reflTex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, reflTex);
    texParams();

    let texA = null, texB = null, simW = 0, simH = 0;
    let reflDirty = true, lastGlow = null, lastLight = null;
    let pending = [];
    let accum = 0;
    let prevTime = performance.now();

    function makeSimTex(w, h){
      const t = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, t);
      gl.texStorage2D(gl.TEXTURE_2D, 1, gl.RGBA16F, w, h);
      texParams();
      const f = gl.createFramebuffer();
      gl.bindFramebuffer(gl.FRAMEBUFFER, f);
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
      if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) !== gl.FRAMEBUFFER_COMPLETE) return null;
      gl.clearColor(0, 0, 0, 0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      return { t, f };
    }

    function dropSimTex(pair){
      if (!pair) return;
      gl.deleteTexture(pair.t);
      gl.deleteFramebuffer(pair.f);
    }

    function resize(){
      canvas.width = Math.round(waterWidth * waterDpr);
      canvas.height = Math.round(waterHeight * waterDpr);
      simW = Math.max(96, Math.min(384, Math.round(waterWidth / 3)));
      simH = Math.max(72, Math.min(288, Math.round(Math.max(1, waterHeight - surfaceY) / 2)));
      dropSimTex(texA);
      dropSimTex(texB);
      texA = makeSimTex(simW, simH);
      texB = makeSimTex(simW, simH);
      reflDirty = true;
    }

    function uploadReflection(){
      gl.bindTexture(gl.TEXTURE_2D, reflTex);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
      gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, true);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, reflectionCanvas);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
      gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, false);
    }

    function disturb(lx, ly, force){
      const span = Math.max(1, waterHeight - surfaceY);
      const vs = (ly - surfaceY) / span;
      if (vs < -0.05 || vs > 1.08) return;
      const vp = Math.pow(Math.min(1, Math.max(vs, 0.004)), 1 / SIM_GAMMA);
      const f = Math.min(3, force);
      pending.push(lx / waterWidth, vp, 3.0 + f * 1.8, f * 0.20);
      if (pending.length > 40) pending = pending.slice(-40);
      simEnergy = Math.min(3, simEnergy + force * 0.35);
    }

    function step(applyDrops){
      gl.useProgram(stepProg);
      gl.bindVertexArray(vao);
      gl.viewport(0, 0, simW, simH);
      gl.bindFramebuffer(gl.FRAMEBUFFER, texB.f);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texA.t);
      gl.uniform1i(su.prev, 0);
      gl.uniform2f(su.texel, 1 / simW, 1 / simH);
      gl.uniform2f(su.simSize, simW, simH);
      const n = applyDrops ? Math.min(10, pending.length / 4) : 0;
      gl.uniform1i(su.dropCount, n);
      if (n) gl.uniform4fv(su.drops, new Float32Array(pending.slice(0, n * 4)));
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      const tmp = texA; texA = texB; texB = tmp;
    }

    function render(time){
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.clearColor(0, 0, 0, 0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(drawProg);
      gl.bindVertexArray(vao);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texA.t);
      gl.activeTexture(gl.TEXTURE1);
      gl.bindTexture(gl.TEXTURE_2D, reflTex);
      gl.uniform1i(du.height, 0);
      gl.uniform1i(du.refl, 1);
      gl.uniform2f(du.size, waterWidth, waterHeight);
      gl.uniform1f(du.surfaceY, surfaceY);
      gl.uniform1f(du.time, time);
      const light = isLight();
      if (light) gl.uniform3f(du.lineCol, 34 / 255, 92 / 255, 104 / 255);
      else gl.uniform3f(du.lineCol, 205 / 255, 229 / 255, 228 / 255);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    }

    function drawSimOverlay(time, dt){
      waterCtx.clearRect(0, 0, waterWidth, waterHeight);
      const light = isLight();
      const line = light ? '34, 92, 104' : '205, 229, 228';
      const glow = light ? '55, 112, 122' : '173, 211, 214';
      simEnergy *= Math.pow(0.998, dt);
      const surfaceGrad = waterCtx.createLinearGradient(0, surfaceY - 36, 0, waterHeight);
      surfaceGrad.addColorStop(0, 'rgba(' + glow + ', ' + (0.018 + Math.min(0.05, simEnergy * 0.01)) + ')');
      surfaceGrad.addColorStop(0.22, 'rgba(' + glow + ', ' + (light ? 0.035 : 0.045) + ')');
      surfaceGrad.addColorStop(1, 'rgba(' + glow + ', 0)');
      waterCtx.fillStyle = surfaceGrad;
      waterCtx.fillRect(0, Math.max(0, surfaceY - 44), waterWidth, waterHeight);
      drawDrops(dt, line);
    }

    function frame(time){
      const dt = Math.min(60, time - prevTime);
      prevTime = time;
      if (!simW || !texA || !texB){ requestAnimationFrame(frame); return; }

      const glow = brandGlowSignature(), light = isLight();
      if (glow !== lastGlow || light !== lastLight){
        lastGlow = glow;
        lastLight = light;
        reflDirty = true;
      }
      if (reflDirty && waterWidth){
        drawReflectionSource();
        uploadReflection();
        reflDirty = false;
      }

      accum = Math.min(accum + dt, 48);
      let first = true;
      while (accum >= 7){
        step(first);
        first = false;
        accum -= 7;
      }
      if (!first) pending.length = 0;

      render(time);
      drawSimOverlay(time, dt);
      requestAnimationFrame(frame);
    }

    return { resize, disturb, frame, markDirty(){ reflDirty = true; } };
  }

  addEventListener('pointermove', e => {
    pointerX = e.clientX;
    pointerY = e.clientY;
    const waterRect = water.getBoundingClientRect();
    const localY = pointerY - waterRect.top;
    const wasInside = pointerInsideWater;
    pointerInsideWater = localY >= surfaceY - 16 && localY <= waterHeight;
    const movement = Math.hypot(pointerX - lastPointerX, pointerY - lastPointerY);
    if (pointerInsideWater && (e.buttons || movement > (simWater ? 2 : 8) || !wasInside)){
      disturbFromPointer(pointerX, pointerY, Math.min(2.4, 0.45 + movement * 0.035 + (e.buttons ? 0.8 : 0)));
    }
    lastPointerX = pointerX;
    lastPointerY = pointerY;
  }, { passive: true });

  addEventListener('pointerdown', e => {
    pointerX = e.clientX;
    pointerY = e.clientY;
    disturbFromPointer(pointerX, pointerY, 2.1);
  }, { passive: true });

  addEventListener('pointerleave', () => {
    pointerInsideWater = false;
  });

  simWater = initSimWater();
  resizeWater();
  if (simWater){
    logoImg.addEventListener('load', () => simWater.markDirty(), { once: true });
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => simWater.markDirty());
    requestAnimationFrame(simWater.frame);
  } else {
    document.getElementById('waterSim').style.display = 'none';
    logoImg.addEventListener('load', () => drawWater(performance.now()), { once: true });
    requestAnimationFrame(drawWater);
  }

  addEventListener('resize', () => {
    clearTimeout(window.__rzt);
    window.__rzt = setTimeout(resizeWater, 120);
  });
})();
</script>
